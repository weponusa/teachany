<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeachAny 学习路径 · Learning Path</title>
<style>
:root {
  --bg: #0f172a;
  --bg2: #1e293b;
  --card: rgba(30, 41, 59, 0.7);
  --border: rgba(148, 163, 184, 0.15);
  --text: #f8fafc;
  --dim: #94a3b8;
  --dimmer: #64748b;
  --primary: #3b82f6;
  --secondary: #8b5cf6;
  --accent: #f59e0b;
  --success: #10b981;
  --danger: #ef4444;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'PingFang SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  min-height: 100vh;
}

/* Top Bar */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.top-bar h1 {
  font-size: 20px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.nav-links { display: flex; gap: 8px; }
.nav-links a {
  color: var(--dim);
  text-decoration: none;
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 14px;
  transition: all 0.2s;
}
.nav-links a:hover, .nav-links a.active {
  color: var(--text);
  background: rgba(59,130,246,0.15);
}

/* Main */
.container { max-width: 800px; margin: 0 auto; padding: 40px 24px; }

.hero-section {
  text-align: center;
  margin-bottom: 40px;
}
.hero-section h2 {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 12px;
}
.hero-section p {
  color: var(--dim);
  font-size: 16px;
}

/* Selector */
.selector-row {
  display: flex;
  gap: 12px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}
.selector-row select, .selector-row button {
  padding: 10px 18px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text);
  font-size: 15px;
  cursor: pointer;
  transition: all 0.2s;
}
.selector-row select { flex: 1; min-width: 180px; }
.selector-row select:focus { outline: none; border-color: var(--primary); }
.selector-row button {
  background: var(--primary);
  border-color: var(--primary);
  font-weight: 600;
  white-space: nowrap;
}
.selector-row button:hover { filter: brightness(1.15); }

/* Path */
.path-container { position: relative; }

.path-step {
  display: flex;
  gap: 20px;
  margin-bottom: 0;
  position: relative;
  padding-left: 40px;
  padding-bottom: 24px;
}
.path-step::before {
  content: '';
  position: absolute;
  left: 15px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--border);
}
.path-step:last-child::before { display: none; }

.step-dot {
  position: absolute;
  left: 6px;
  top: 4px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 2.5px solid var(--dimmer);
  background: var(--bg);
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
}
.step-dot.completed {
  border-color: var(--success);
  background: rgba(16,185,129,0.2);
}
.step-dot.active-course {
  border-color: var(--primary);
  background: rgba(59,130,246,0.2);
}
.step-dot.user-course {
  border-color: var(--accent);
  background: rgba(245,158,11,0.18);
}
.step-dot.in-progress {
  border-color: #a78bfa;
  background: rgba(139,92,246,0.22);
}
.step-dot.gap {
  border-color: var(--dimmer);
  border-style: dashed;
}

.step-card {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  transition: all 0.3s;
}
.step-card:hover { border-color: rgba(59,130,246,0.3); transform: translateX(4px); }
.step-card.completed-card { opacity: 0.6; }
.step-card h3 { font-size: 16px; margin-bottom: 4px; }
.step-card .step-meta {
  font-size: 13px;
  color: var(--dim);
  display: flex;
  gap: 12px;
  margin-bottom: 8px;
}
.step-card .step-status {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 600;
}
.status-completed { background: rgba(16,185,129,0.2); color: var(--success); }
.status-available { background: rgba(59,130,246,0.2); color: var(--primary); }
.status-user { background: rgba(245,158,11,0.18); color: var(--accent); }
.status-progress { background: rgba(139,92,246,0.18); color: #c4b5fd; }
.status-gap { background: rgba(100,116,139,0.2); color: var(--dimmer); }
.status-locked { background: rgba(239,68,68,0.1); color: rgba(239,68,68,0.6); }

.step-link {
  display: inline-block;
  margin-top: 8px;
  padding: 5px 14px;
  background: var(--primary);
  color: white;
  border-radius: 6px;
  text-decoration: none;
  font-size: 13px;
  font-weight: 600;
}
.step-link:hover { filter: brightness(1.15); }

/* Progress bar */
.progress-section { margin-bottom: 32px; }
.progress-bar-bg {
  width: 100%;
  height: 8px;
  background: var(--bg2);
  border-radius: 4px;
  overflow: hidden;
  margin-top: 8px;
}
.progress-bar-fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--primary), var(--success));
  transition: width 0.5s ease;
}
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: var(--dim);
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--dimmer);
}
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
</style>
</head>
<body>

<div class="top-bar">
  <h1>🛤️ TeachAny 学习路径</h1>
  <div class="nav-links">
    <a href="index.html">📋 Gallery</a>
    <a href="tree.html">🌳 知识树</a>
    <a href="path.html" class="active">🛤️ 学习路径</a>
  </div>
</div>

<div class="container">
  <div class="hero-section">
    <h2>为你的孩子规划学习路径</h2>
    <p>选择学科和目标知识点，系统根据知识图谱自动生成最优路线——属于每个孩子的定制化学习</p>
  </div>

  <div class="selector-row">
    <select id="subjectSelect">
      <option value="">选择学科...</option>
    </select>
    <select id="nodeSelect" disabled>
      <option value="">选择目标知识点...</option>
    </select>
    <button onclick="generatePath()">🚀 生成路径</button>
  </div>

  <div id="pathResult"></div>
</div>

<script src="./scripts/courseware-importer.js"></script>
<script>
const TREES = [
  { file: 'data/trees/chinese-elementary.json', emoji: '📖', label: '小学语文' },
  { file: 'data/trees/math-elementary.json', emoji: '🔢', label: '小学数学' },
  { file: 'data/trees/english-elementary.json', emoji: '🔤', label: '小学英语' },
  { file: 'data/trees/chinese-middle.json', emoji: '📝', label: '初中语文' },
  { file: 'data/trees/math-middle.json', emoji: '📐', label: '初中数学' },
  { file: 'data/trees/english-middle.json', emoji: '🅰️', label: '初中英语' },
  { file: 'data/trees/physics-middle.json', emoji: '⚡', label: '初中物理' },
  { file: 'data/trees/chemistry-middle.json', emoji: '🧪', label: '初中化学' },
  { file: 'data/trees/biology-middle.json', emoji: '🌱', label: '初中生物' },
  { file: 'data/trees/geography-middle.json', emoji: '🗺️', label: '初中地理' },
  { file: 'data/trees/history-middle.json', emoji: '📜', label: '初中历史' },
  { file: 'data/trees/chinese-high.json', emoji: '📚', label: '高中语文' },
  { file: 'data/trees/math-high.json', emoji: '∑', label: '高中数学' },
  { file: 'data/trees/english-high.json', emoji: '🌐', label: '高中英语' },
  { file: 'data/trees/physics-high.json', emoji: '⚛️', label: '高中物理' },
  { file: 'data/trees/chemistry-high.json', emoji: '⚗️', label: '高中化学' },
  { file: 'data/trees/biology-high.json', emoji: '🧬', label: '高中生物' },
  { file: 'data/trees/geography-high.json', emoji: '🌍', label: '高中地理' },
  { file: 'data/trees/history-high.json', emoji: '🏛️', label: '高中历史' }
];

const LEGACY_PROGRESS_KEY = 'teachany_progress';
const PER_COURSE_PROGRESS_PREFIX = 'teachany_progress_';

let treeCache = {};
let allNodes = {};

const subjectSel = document.getElementById('subjectSelect');
const nodeSel = document.getElementById('nodeSelect');
const pathResultEl = document.getElementById('pathResult');

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function safeParseJSON(value, fallback) {
  try {
    return JSON.parse(value);
  } catch {
    return fallback;
  }
}

function getLegacyProgress() {
  return safeParseJSON(localStorage.getItem(LEGACY_PROGRESS_KEY) || '{}', {});
}

function getPerCourseProgressMap() {
  const progressMap = {};
  for (let i = 0; i < localStorage.length; i += 1) {
    const key = localStorage.key(i);
    if (!key || !key.startsWith(PER_COURSE_PROGRESS_PREFIX)) continue;
    progressMap[key.slice(PER_COURSE_PROGRESS_PREFIX.length)] = safeParseJSON(localStorage.getItem(key) || '{}', {});
  }
  return progressMap;
}

function buildProgressContext() {
  return {
    legacy: getLegacyProgress(),
    perCourse: getPerCourseProgressMap(),
  };
}

function summarizeCourseProgress(progressData) {
  if (!progressData || typeof progressData !== 'object') {
    return { percent: 0, completed: false, score: null };
  }

  if (progressData.completed === true) {
    const score = Number.isFinite(progressData.post_test_score)
      ? progressData.post_test_score
      : (Number.isFinite(progressData.score) ? progressData.score : null);
    return { percent: 100, completed: true, score };
  }

  if (Number.isFinite(progressData.completionPercent)) {
    const percent = Math.max(0, Math.min(100, Math.round(progressData.completionPercent)));
    return {
      percent,
      completed: percent >= 100,
      score: Number.isFinite(progressData.score) ? progressData.score : percent,
    };
  }

  const moduleScores = Object.values(progressData.modules || {})
    .map((value) => Number(value))
    .filter((value) => Number.isFinite(value));

  if (moduleScores.length > 0) {
    const percent = Math.round(moduleScores.reduce((sum, value) => sum + value, 0) / moduleScores.length);
    return {
      percent,
      completed: percent >= 80,
      score: percent,
    };
  }

  return { percent: 0, completed: false, score: null };
}

function deriveOfficialCourseId(node) {
  const raw = node?.courses?.[0] || '';
  const parts = String(raw).split('/').filter(Boolean);
  return parts[parts.length - 1] || '';
}

function getUserCourse(nodeId) {
  return window.TeachAnyImporter ? TeachAnyImporter.findUserCourseByNodeId(nodeId) : null;
}

function getUserCourseCount(nodeId) {
  if (!window.TeachAnyImporter) return 0;
  return TeachAnyImporter.findUserCoursesByNodeId(nodeId).length;
}

function getLaunchUrl(node, userCourse) {
  if (userCourse && window.TeachAnyImporter) {
    return TeachAnyImporter.getCourseLaunchUrl(userCourse);
  }
  if (node.status === 'active' && node.courses?.length > 0) {
    return `${node.courses[0]}/index.html`;
  }
  return '';
}

function getNodeProgress(node, userCourse, progressContext) {
  const legacyEntry = progressContext.legacy?.[node.id];
  if (legacyEntry && typeof legacyEntry === 'object') {
    const score = Number.isFinite(legacyEntry.post_test_score)
      ? legacyEntry.post_test_score
      : (Number.isFinite(legacyEntry.score) ? legacyEntry.score : null);
    return {
      percent: legacyEntry.completed ? 100 : 0,
      completed: !!legacyEntry.completed,
      score,
    };
  }

  const candidates = [
    deriveOfficialCourseId(node),
    userCourse?.id,
    userCourse?.manifest?.node_id,
    node.id,
  ].filter(Boolean);

  const snapshots = candidates
    .map((courseId) => ({ courseId, ...summarizeCourseProgress(progressContext.perCourse?.[courseId]) }))
    .filter((item) => item.completed || item.percent > 0);

  if (!snapshots.length) {
    return { percent: 0, completed: false, score: null };
  }

  snapshots.sort((a, b) => {
    if (a.completed !== b.completed) return a.completed ? -1 : 1;
    return b.percent - a.percent;
  });

  return snapshots[0];
}

function resolvePrereqs(targetId) {
  const visited = new Set();
  const order = [];

  function dfs(id) {
    if (visited.has(id)) return;
    visited.add(id);
    const node = allNodes[id];
    if (!node) return;
    (node.prerequisites || []).forEach((pid) => dfs(pid));
    order.push(id);
  }

  dfs(targetId);
  return order;
}

function renderEmptyState(message) {
  pathResultEl.innerHTML = `<div class="empty-state"><div class="icon">🛤️</div><p>${message}</p></div>`;
}

TREES.forEach((tree, index) => {
  const option = document.createElement('option');
  option.value = index;
  option.textContent = `${tree.emoji} ${tree.label}`;
  subjectSel.appendChild(option);
});

subjectSel.onchange = async () => {
  const idx = subjectSel.value;
  if (idx === '') {
    nodeSel.disabled = true;
    nodeSel.innerHTML = '<option value="">选择目标知识点...</option>';
    return;
  }

  if (!treeCache[idx]) {
    const response = await fetch(TREES[idx].file);
    treeCache[idx] = await response.json();
  }

  const tree = treeCache[idx];
  allNodes = {};
  nodeSel.innerHTML = '<option value="">选择目标知识点...</option>';

  tree.domains.forEach((domain) => {
    const group = document.createElement('optgroup');
    group.label = domain.name;

    domain.nodes.forEach((node) => {
      const mergedNode = { ...node, domain: domain.name, domainColor: domain.color };
      allNodes[node.id] = mergedNode;

      const userCourse = getUserCourse(node.id);
      const option = document.createElement('option');
      option.value = node.id;
      option.textContent = `${node.name}${userCourse ? ' 📂' : (node.status === 'active' ? ' ✅' : ' 📝')}`;
      group.appendChild(option);
    });

    nodeSel.appendChild(group);
  });

  nodeSel.disabled = false;
};

function generatePath() {
  const targetId = nodeSel.value;
  if (!targetId) {
    renderEmptyState('选择学科和目标知识点后，系统会按前置依赖自动生成路线');
    return;
  }

  const progressContext = buildProgressContext();
  const path = resolvePrereqs(targetId)
    .map((id) => {
      const node = allNodes[id];
      if (!node) return null;
      const userCourse = getUserCourse(id);
      const launchUrl = getLaunchUrl(node, userCourse);
      const progress = getNodeProgress(node, userCourse, progressContext);
      return { id, node, userCourse, launchUrl, progress };
    })
    .filter(Boolean);

  const completedCount = path.filter((item) => item.progress.completed).length;
  const totalCount = path.length;
  const percent = totalCount ? Math.round((completedCount / totalCount) * 100) : 0;

  let html = `
    <div class="progress-section">
      <div class="progress-label">
        <span>学习进度</span>
        <span>${completedCount} / ${totalCount} 完成 (${percent}%)</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" style="width:${percent}%"></div>
      </div>
    </div>
  `;

  html += '<div class="path-container">';

  path.forEach((entry, index) => {
    const { id, node, userCourse, launchUrl, progress } = entry;
    const isTarget = id === targetId;
    const hasOfficialCourse = node.status === 'active' && node.courses?.length > 0;
    const communityCount = getUserCourseCount(id);

    let statusClass = 'status-gap';
    let statusText = '📝 待创建课件';
    let dotClass = 'gap';
    let actionHtml = '<a class="step-link" href="tree.html" target="_blank" rel="noopener noreferrer" style="background:rgba(148,163,184,0.16);color:#e2e8f0;">去知识树补课件 →</a>';

    if (progress.completed) {
      statusClass = 'status-completed';
      statusText = `✅ 已掌握${progress.score != null ? ` (${progress.score}分)` : ''}`;
      dotClass = 'completed';
      actionHtml = launchUrl
        ? `<a class="step-link" href="${escapeHtml(launchUrl)}" target="_blank" rel="noopener noreferrer">复习课件 →</a>`
        : '';
    } else if (launchUrl && progress.percent > 0) {
      statusClass = 'status-progress';
      statusText = `📈 学习中 ${progress.percent}%`;
      dotClass = 'in-progress';
      actionHtml = `<a class="step-link" href="${escapeHtml(launchUrl)}" target="_blank" rel="noopener noreferrer">继续学习 →</a>`;
    } else if (userCourse) {
      statusClass = 'status-user';
      statusText = communityCount > 1
        ? `📂 社区课件 ×${communityCount}（显示最高赞）`
        : '📂 我的课件，已可学习';
      dotClass = 'user-course';
      actionHtml = `<a class="step-link" href="${escapeHtml(launchUrl)}" target="_blank" rel="noopener noreferrer">打开课件 →</a>`;
    } else if (hasOfficialCourse) {
      statusClass = 'status-available';
      statusText = '📖 官方课件，可学习';
      dotClass = 'active-course';
      actionHtml = `<a class="step-link" href="${escapeHtml(launchUrl)}" target="_blank" rel="noopener noreferrer">开始学习 →</a>`;
    }

    // 点赞数显示（仅用户课件）
    const likeInfo = userCourse && window.TeachAnyImporter
      ? ` · ❤️ ${TeachAnyImporter.getCourseLikes(userCourse.id)}`
      : '';

    html += `
      <div class="path-step">
        <div class="step-dot ${dotClass}">${index + 1}</div>
        <div class="step-card ${progress.completed ? 'completed-card' : ''}">
          <h3>${isTarget ? '🎯 ' : ''}${escapeHtml(node.name)}</h3>
          <div class="step-meta">
            <span>${escapeHtml(node.domain)}</span>
            <span>${escapeHtml(node.grade)}年级</span>
            <span>${userCourse ? `社区课件${communityCount > 1 ? ' ×' + communityCount : ''}` : (hasOfficialCourse ? '官方课件' : '缺少课件')}${likeInfo}</span>
            ${node.prerequisites?.length ? `<span>前置：${escapeHtml(node.prerequisites.join('、'))}</span>` : ''}
          </div>
          <span class="step-status ${statusClass}">${statusText}</span>
          ${actionHtml}
        </div>
      </div>
    `;
  });

  html += '</div>';
  pathResultEl.innerHTML = html;
}

renderEmptyState('选择学科和目标知识点，自动生成学习路径<br><br>系统会结合知识前置关系、官方课件、我的课件和已保存进度，帮你规划最优学习路线');
</script>
</body>
</html>
