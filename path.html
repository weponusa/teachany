<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学习路径 Learning Path - TeachAny</title>
<style>
:root {
  --bg: #0f172a;
  --bg2: #1e293b;
  --card: rgba(30, 41, 59, 0.8);
  --border: rgba(148, 163, 184, 0.15);
  --text: #f8fafc;
  --dim: #94a3b8;
  --dimmer: #64748b;
  --primary: #3b82f6;
  --secondary: #8b5cf6;
  --accent: #f59e0b;
  --success: #10b981;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'PingFang SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
}

/* Top Bar */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.top-bar h1 {
  font-size: 20px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.nav-links { display: flex; gap: 8px; }
.nav-links a {
  color: var(--dim);
  text-decoration: none;
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 14px;
  transition: all 0.2s;
}
.nav-links a:hover, .nav-links a.active {
  color: var(--text);
  background: rgba(59,130,246,0.15);
}

/* Header */
.header {
  text-align: center;
  padding: 60px 24px 40px;
  background: linear-gradient(135deg, rgba(59,130,246,0.08), rgba(139,92,246,0.06));
}
.header h1 {
  font-size: 42px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 12px;
}
.header p {
  font-size: 16px;
  color: var(--dim);
  max-width: 600px;
  margin: 0 auto;
}

/* Container */
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 40px 24px;
}

/* Search Section */
.search-section {
  margin-bottom: 40px;
}
.search-box {
  max-width: 600px;
  margin: 0 auto;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 16px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.search-box:focus-within {
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(59,130,246,0.1);
}
.search-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  font-size: 16px;
  color: var(--text);
}
.search-input::placeholder {
  color: var(--dimmer);
}
.search-btn {
  padding: 8px 20px;
  border-radius: 8px;
  background: var(--primary);
  color: white;
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.search-btn:hover {
  background: var(--secondary);
  transform: scale(1.05);
}

/* Path Visualization */
.learning-path-viz {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px;
}

.path-section {
  margin-bottom: 48px;
}
.path-section:last-child {
  margin-bottom: 0;
}
.path-section h3 {
  font-size: 24px;
  margin-bottom: 24px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--border);
}

/* Current Node */
.current-node {
  background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(139,92,246,0.1));
  border: 2px solid var(--primary);
  border-radius: 16px;
  padding: 32px;
  text-align: center;
}
.current-node h2 {
  font-size: 32px;
  margin-bottom: 16px;
  color: var(--primary);
}
.current-node p {
  font-size: 16px;
  color: var(--dim);
  margin-bottom: 24px;
}
.courseware-link {
  display: inline-block;
  margin: 8px;
  padding: 8px 16px;
  border-radius: 8px;
  background: rgba(59,130,246,0.15);
  color: var(--primary);
  text-decoration: none;
  font-size: 14px;
  transition: all 0.2s;
}
.courseware-link:hover {
  background: rgba(59,130,246,0.25);
  transform: translateY(-2px);
}

/* Node List */
.node-list {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
}
.path-node {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  min-width: 200px;
  cursor: pointer;
  transition: all 0.3s;
}
.path-node:hover {
  border-color: var(--primary);
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.node-grade {
  font-size: 12px;
  color: var(--dimmer);
  margin-bottom: 8px;
}
.node-name {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text);
}
.node-courses {
  font-size: 13px;
  color: var(--accent);
}
.arrow {
  font-size: 24px;
  color: var(--dimmer);
}

/* Node Tree */
.node-tree {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.tree-node {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--success);
  border-radius: 12px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.3s;
}
.tree-node:hover {
  border-left-color: var(--primary);
  background: rgba(59,130,246,0.08);
  transform: translateX(4px);
}
.tree-node.level-1 {
  margin-left: 40px;
  border-left-color: var(--accent);
}
.tree-node.level-2 {
  margin-left: 80px;
  border-left-color: var(--dimmer);
}
.node-content {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.node-children {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

/* Node Grid */
.node-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 16px;
}
.parallel-node {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  cursor: pointer;
  text-align: center;
  transition: all 0.3s;
}
.parallel-node:hover {
  border-color: var(--secondary);
  transform: scale(1.05);
}

/* Stats Cards */
.stats-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  margin-bottom: 40px;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  text-align: center;
}
.stat-value {
  font-size: 36px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.stat-label {
  font-size: 14px;
  color: var(--dimmer);
}

/* Loading */
.loading {
  text-align: center;
  padding: 60px 24px;
  font-size: 16px;
  color: var(--dim);
}

/* Empty State */
.empty-state {
  text-align: center;
  padding: 80px 24px;
}
.empty-state .icon {
  font-size: 64px;
  margin-bottom: 16px;
  opacity: 0.5;
}
.empty-state h2 {
  font-size: 24px;
  margin-bottom: 12px;
  color: var(--dim);
}
.empty-state p {
  font-size: 16px;
  color: var(--dimmer);
}

@media (max-width: 768px) {
  .header h1 { font-size: 32px; }
  .node-list { flex-direction: column; align-items: stretch; }
  .tree-node.level-1 { margin-left: 20px; }
  .tree-node.level-2 { margin-left: 40px; }
  .stats-cards { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="top-bar">
  <h1>🎓 TeachAny</h1>
  <div class="nav-links">
    <a href="index.html">📋 Gallery / 课件库</a>
    <a href="tree.html">🗺️ Knowledge Map / 知识地图</a>
    <a href="path.html" class="active">🛤️ Learning Path / 学习路径</a>
  </div>
</div>

<div class="header">
  <h1>🛤️ 学习路径系统</h1>
  <p>探索知识点的前后序关系，打通各学段知识体系，构建完整学习地图</p>
</div>

<div class="container">
  <!-- 搜索框 -->
  <div class="search-section">
    <div class="search-box">
      <span style="font-size:20px">🔍</span>
      <input 
        type="text" 
        id="nodeSearchInput" 
        class="search-input"
        placeholder="输入知识点ID（如 addition-subtraction-within-20）..."
      />
      <button class="search-btn" onclick="showPathForNode()">显示路径</button>
    </div>
  </div>

  <!-- 统计卡片 -->
  <div class="stats-cards">
    <div class="stat-card">
      <div class="stat-value" id="totalNodesCount">275</div>
      <div class="stat-label">知识节点总数</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="coveredNodesCount">131</div>
      <div class="stat-label">已有课件节点</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="coverageRate">47.6%</div>
      <div class="stat-label">节点覆盖率</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="crossGradeChainsCount">12</div>
      <div class="stat-label">跨学段知识链</div>
    </div>
  </div>

  <!-- 学习路径可视化容器 -->
  <div id="learning-path-container">
    <div class="empty-state">
      <div class="icon">🗺️</div>
      <h2>输入知识点ID查看学习路径</h2>
      <p>示例: addition-subtraction-within-20, rational-numbers, functions-advanced</p>
      <p style="margin-top:16px;font-size:14px">或者从<a href="tree.html" style="color:var(--primary)">知识地图</a>点击任意节点跳转</p>
    </div>
  </div>
</div>

<script src="./scripts/learning-path.js"></script>
<script>
// 从URL参数获取node_id
const urlParams = new URLSearchParams(window.location.search);
const nodeIdFromURL = urlParams.get('node');

async function showPathForNode() {
  const input = document.getElementById('nodeSearchInput');
  const nodeId = input.value.trim() || nodeIdFromURL;
  
  if (!nodeId) {
    alert('请输入知识点ID');
    return;
  }

  // 显示加载状态
  const container = document.getElementById('learning-path-container');
  container.innerHTML = '<div class="loading">⏳ 正在加载学习路径...</div>';

  try {
    // 初始化系统
    await window.TeachAnyLearningPath.initialize();
    
    // 显示路径
    await window.TeachAnyLearningPath.api.showPath(nodeId, 'learning-path-container');
    
    // 更新URL（不刷新页面）
    history.pushState(null, '', `?node=${nodeId}`);
  } catch (error) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">⚠️</div>
        <h2>未找到知识点</h2>
        <p>找不到ID为 "${nodeId}" 的知识点</p>
        <p style="margin-top:8px;font-size:14px;color:var(--dimmer)">请检查拼写或从知识地图中选择</p>
      </div>
    `;
    console.error('[Path] 加载失败:', error);
  }
}

// 页面加载时自动显示路径（如果有node参数）
if (nodeIdFromURL) {
  document.getElementById('nodeSearchInput').value = nodeIdFromURL;
  showPathForNode();
}

// 回车键触发搜索
document.getElementById('nodeSearchInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    showPathForNode();
  }
});
</script>

</body>
</html>
