<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学习路径 Learning Path - TeachAny</title>
<style>
:root {
  --bg: #0f172a;
  --bg2: #1e293b;
  --card: rgba(30, 41, 59, 0.8);
  --border: rgba(148, 163, 184, 0.15);
  --text: #f8fafc;
  --dim: #94a3b8;
  --dimmer: #64748b;
  --primary: #3b82f6;
  --secondary: #8b5cf6;
  --accent: #f59e0b;
  --success: #10b981;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'PingFang SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
}

/* Top Bar */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.top-bar h1 {
  font-size: 20px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.nav-links { display: flex; gap: 8px; }
.nav-links a {
  color: var(--dim);
  text-decoration: none;
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 14px;
  transition: all 0.2s;
}
.nav-links a:hover, .nav-links a.active {
  color: var(--text);
  background: rgba(59,130,246,0.15);
}

/* Header */
.header {
  text-align: center;
  padding: 60px 24px 40px;
  background: linear-gradient(135deg, rgba(59,130,246,0.08), rgba(139,92,246,0.06));
}
.header h1 {
  font-size: 42px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 12px;
}
.header p {
  font-size: 16px;
  color: var(--dim);
  max-width: 600px;
  margin: 0 auto;
}

/* Container */
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 40px 24px;
}

/* Search Section */
.search-section {
  margin-bottom: 40px;
}

/* Selector Group */
.selector-group {
  max-width: 1200px;
  margin: 0 auto;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  display: flex;
  align-items: flex-end;
  gap: 16px;
  flex-wrap: wrap;
}

.filter-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex: 1;
  min-width: 180px;
}

.filter-group label {
  font-size: 13px;
  font-weight: 600;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.subject-select,
.grade-select,
.node-select {
  padding: 12px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  outline: none;
}

.subject-select:hover,
.grade-select:hover,
.node-select:hover {
  border-color: var(--primary);
}

.subject-select:focus,
.grade-select:focus,
.node-select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
}

.node-select {
  flex: 1;
}

.node-select option {
  padding: 8px;
}

.search-btn {
  padding: 12px 24px;
  border-radius: 8px;
  background: var(--primary);
  color: white;
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  align-self: stretch;
}

.search-btn:hover {
  background: var(--secondary);
  transform: scale(1.05);
}

.search-btn:active {
  transform: scale(0.98);
}

/* Path Visualization */
.learning-path-viz {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 32px;
}

.path-section {
  margin-bottom: 48px;
}
.path-section:last-child {
  margin-bottom: 0;
}
.path-section h3 {
  font-size: 24px;
  margin-bottom: 24px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--border);
}

/* Current Node */
.current-node {
  background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(139,92,246,0.1));
  border: 2px solid var(--primary);
  border-radius: 16px;
  padding: 32px;
  text-align: center;
}
.current-node h2 {
  font-size: 32px;
  margin-bottom: 16px;
  color: var(--primary);
}
.current-node p {
  font-size: 16px;
  color: var(--dim);
  margin-bottom: 24px;
}
.courseware-link {
  display: inline-block;
  margin: 8px;
  padding: 8px 16px;
  border-radius: 8px;
  background: rgba(59,130,246,0.15);
  color: var(--primary);
  text-decoration: none;
  font-size: 14px;
  transition: all 0.2s;
}
.courseware-link:hover {
  background: rgba(59,130,246,0.25);
  transform: translateY(-2px);
}

/* Node List */
.node-list {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  justify-content: center;
}
.path-node {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  min-width: 200px;
  cursor: pointer;
  transition: all 0.3s;
}
.path-node:hover {
  border-color: var(--primary);
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.node-grade {
  font-size: 12px;
  color: var(--dimmer);
  margin-bottom: 8px;
}
.node-name {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text);
}
.node-courses {
  font-size: 13px;
  color: var(--accent);
}
.arrow {
  font-size: 24px;
  color: var(--dimmer);
}

/* Node Tree */
.node-tree {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.tree-node {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--success);
  border-radius: 12px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.3s;
}
.tree-node:hover {
  border-left-color: var(--primary);
  background: rgba(59,130,246,0.08);
  transform: translateX(4px);
}
.tree-node.level-1 {
  margin-left: 40px;
  border-left-color: var(--accent);
}
.tree-node.level-2 {
  margin-left: 80px;
  border-left-color: var(--dimmer);
}
.node-content {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.node-children {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

/* Node Grid */
.node-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 16px;
}
.parallel-node {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  cursor: pointer;
  text-align: center;
  transition: all 0.3s;
}
.parallel-node:hover {
  border-color: var(--secondary);
  transform: scale(1.05);
}

/* Stats Cards */
.stats-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  margin-bottom: 40px;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  text-align: center;
}
.stat-value {
  font-size: 36px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.stat-label {
  font-size: 14px;
  color: var(--dimmer);
}

/* Loading */
.loading {
  text-align: center;
  padding: 60px 24px;
  font-size: 16px;
  color: var(--dim);
}

/* Empty State */
.empty-state {
  text-align: center;
  padding: 80px 24px;
}
.empty-state .icon {
  font-size: 64px;
  margin-bottom: 16px;
  opacity: 0.5;
}
.empty-state h2 {
  font-size: 24px;
  margin-bottom: 12px;
  color: var(--dim);
}
.empty-state p {
  font-size: 16px;
  color: var(--dimmer);
}

@media (max-width: 768px) {
  .header h1 { font-size: 32px; }
  .selector-group {
    flex-direction: column;
    align-items: stretch;
  }
  .filter-group {
    min-width: 100%;
  }
  .node-list { flex-direction: column; align-items: stretch; }
  .tree-node.level-1 { margin-left: 20px; }
  .tree-node.level-2 { margin-left: 40px; }
  .stats-cards { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="top-bar">
  <h1>🎓 TeachAny</h1>
  <div class="nav-links">
    <a href="index.html">📋 Gallery / 课件库</a>
    <a href="tree.html">🗺️ Knowledge Map / 知识地图</a>
    <a href="path.html" class="active">🛤️ Learning Path / 学习路径</a>
  </div>
</div>

<div class="header">
  <h1>🛤️ 学习路径系统</h1>
  <p>探索知识点的前后序关系，打通各学段知识体系，构建完整学习地图</p>
</div>

<div class="container">
  <!-- 选择器 -->
  <div class="search-section">
    <div class="selector-group">
      <!-- 学科筛选 -->
      <div class="filter-group">
        <label for="subjectFilter">📚 学科</label>
        <select id="subjectFilter" class="subject-select" onchange="filterNodesBySubject()">
          <option value="all">全部学科</option>
          <option value="math">📐 数学 Math</option>
          <option value="chinese">📖 语文 Chinese</option>
          <option value="english">🔤 英语 English</option>
          <option value="physics">⚡ 物理 Physics</option>
          <option value="chemistry">🧪 化学 Chemistry</option>
          <option value="biology">🧬 生物 Biology</option>
          <option value="geography">🌍 地理 Geography</option>
          <option value="history">🏛️ 历史 History</option>
          <option value="info-tech">💻 信息技术 Info Tech</option>
        </select>
      </div>
      
      <!-- 年级筛选 -->
      <div class="filter-group">
        <label for="gradeFilter">🎓 年级</label>
        <select id="gradeFilter" class="grade-select" onchange="filterNodesByGrade()">
          <option value="all">全部年级</option>
          <option value="elementary">🏫 小学 (1-6年级)</option>
          <option value="middle">📘 初中 (7-9年级)</option>
          <option value="high">🎓 高中 (10-12年级)</option>
        </select>
      </div>
      
      <!-- 知识点选择 -->
      <div class="filter-group" style="flex: 2">
        <label for="nodeSelect">🎯 选择知识点</label>
        <select id="nodeSelect" class="node-select">
          <option value="">请先选择学科和年级...</option>
        </select>
      </div>
      
      <button class="search-btn" onclick="showPathForNode()">📍 显示学习路径</button>
    </div>
  </div>

  <!-- 统计卡片 -->
  <div class="stats-cards">
    <div class="stat-card">
      <div class="stat-value" id="totalNodesCount">275</div>
      <div class="stat-label">知识节点总数</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="coveredNodesCount">131</div>
      <div class="stat-label">已有课件节点</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="coverageRate">47.6%</div>
      <div class="stat-label">节点覆盖率</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="crossGradeChainsCount">12</div>
      <div class="stat-label">跨学段知识链</div>
    </div>
  </div>

  <!-- 学习路径可视化容器 -->
  <div id="learning-path-container">
    <div class="empty-state">
      <div class="icon">🗺️</div>
      <h2>选择知识点查看学习路径</h2>
      <p>从上方选择器中选择学科、年级和知识点</p>
      <p style="margin-top:16px;font-size:14px">或者从<a href="tree.html" style="color:var(--primary)">知识地图</a>点击任意节点跳转</p>
    </div>
  </div>
</div>

<script src="./scripts/learning-path.js"></script>
<script>
// 全局状态
let currentSubject = 'all';
let currentGrade = 'all';
let allNodes = [];
let nodesLoaded = false;

// 从服务器加载完整节点数据
async function loadAllNodes() {
  if (nodesLoaded) return allNodes;
  
  try {
    console.log('[Path] 加载完整节点数据...');
    const response = await fetch('./data/nodes-selector.json?t=' + Date.now());
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }
    
    const data = await response.json();
    allNodes = data;
    nodesLoaded = true;
    
    console.log(`[Path] ✅ 加载成功: ${allNodes.length} 个节点`);
    
    // 统计
    const stats = {
      total: allNodes.length,
      bySubject: {},
      byGrade: {}
    };
    
    allNodes.forEach(node => {
      stats.bySubject[node.subject] = (stats.bySubject[node.subject] || 0) + 1;
      stats.byGrade[node.grade] = (stats.byGrade[node.grade] || 0) + 1;
    });
    
    console.log('[Path] 学科分布:', stats.bySubject);
    console.log('[Path] 年级分布:', stats.byGrade);
    
    return allNodes;
  } catch (error) {
    console.error('[Path] ❌ 加载节点数据失败:', error);
    alert('加载知识点数据失败，请刷新页面重试');
    return [];
  }
}

// 初始化：加载所有知识点
async function initializeNodeSelector() {
  // 显示加载提示
  const nodeSelect = document.getElementById('nodeSelect');
  nodeSelect.innerHTML = '<option value="">⏳ 正在加载知识点...</option>';
  
  // 加载节点数据
  await loadAllNodes();
  
  if (allNodes.length === 0) {
    nodeSelect.innerHTML = '<option value="">❌ 加载失败，请刷新页面</option>';
    return;
  }
  
  // 加载成功，更新列表
  updateNodeList();
}

// 学科筛选
function filterNodesBySubject() {
  currentSubject = document.getElementById('subjectFilter').value;
  updateNodeList();
}

// 年级筛选
function filterNodesByGrade() {
  currentGrade = document.getElementById('gradeFilter').value;
  updateNodeList();
}

// 更新知识点列表
function updateNodeList() {
  const nodeSelect = document.getElementById('nodeSelect');
  
  // 筛选节点
  let filtered = allNodes;
  
  if (currentSubject !== 'all') {
    filtered = filtered.filter(n => n.subject === currentSubject);
  }
  
  if (currentGrade !== 'all') {
    filtered = filtered.filter(n => {
      const grade = n.grade;
      if (currentGrade === 'elementary') return grade >= 1 && grade <= 6;
      if (currentGrade === 'middle') return grade >= 7 && grade <= 9;
      if (currentGrade === 'high') return grade >= 10 && grade <= 12;
      return true;
    });
  }
  
  // 按年级和名称排序
  filtered.sort((a, b) => {
    if (a.grade !== b.grade) return a.grade - b.grade;
    return a.name.localeCompare(b.name, 'zh-CN');
  });
  
  // 清空并重新填充
  nodeSelect.innerHTML = '';
  
  if (filtered.length === 0) {
    nodeSelect.innerHTML = '<option value="">该学科/年级暂无知识点</option>';
    return;
  }
  
  // 添加提示选项
  nodeSelect.innerHTML = `<option value="">请选择知识点 (共${filtered.length}个)</option>`;
  
  // 按年级分组
  const gradeGroups = {};
  filtered.forEach(node => {
    if (!gradeGroups[node.grade]) gradeGroups[node.grade] = [];
    gradeGroups[node.grade].push(node);
  });
  
  // 添加选项
  Object.keys(gradeGroups).sort((a, b) => a - b).forEach(grade => {
    const gradeLabel = grade <= 6 ? `小学${grade}年级` : 
                       grade <= 9 ? `初中${grade-6}年级` : 
                       `高中${grade-9}年级`;
    
    const optgroup = document.createElement('optgroup');
    optgroup.label = gradeLabel;
    
    gradeGroups[grade].forEach(node => {
      const option = document.createElement('option');
      option.value = node.id;
      option.textContent = node.name;
      optgroup.appendChild(option);
    });
    
    nodeSelect.appendChild(optgroup);
  });
}

// 显示学习路径
async function showPathForNode() {
  const nodeSelect = document.getElementById('nodeSelect');
  const nodeId = nodeSelect.value || urlParams.get('node');
  
  if (!nodeId) {
    alert('请先选择知识点');
    return;
  }

  // 显示加载状态
  const container = document.getElementById('learning-path-container');
  container.innerHTML = '<div class="loading">⏳ 正在加载学习路径...</div>';

  try {
    // 初始化系统
    await window.TeachAnyLearningPath.initialize();
    
    // 显示路径
    await window.TeachAnyLearningPath.api.showPath(nodeId, 'learning-path-container');
    
    // 更新URL（不刷新页面）
    history.pushState(null, '', `?node=${nodeId}`);
  } catch (error) {
    const nodeName = allNodes.find(n => n.id === nodeId)?.name || nodeId;
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">⚠️</div>
        <h2>未找到学习路径</h2>
        <p>知识点 "${nodeName}" 暂无详细路径数据</p>
        <p style="margin-top:8px;font-size:14px;color:var(--dimmer)">该知识点可能尚未建立前后序关系</p>
      </div>
    `;
    console.error('[Path] 加载失败:', error);
  }
}

// URL参数处理
const urlParams = new URLSearchParams(window.location.search);
const nodeIdFromURL = urlParams.get('node');

// 页面加载时初始化
window.addEventListener('DOMContentLoaded', async () => {
  await initializeNodeSelector();
  
  // 如果URL有node参数，自动选中并显示
  if (nodeIdFromURL) {
    const node = allNodes.find(n => n.id === nodeIdFromURL);
    if (node) {
      // 设置筛选条件
      document.getElementById('subjectFilter').value = node.subject;
      currentSubject = node.subject;
      
      if (node.grade >= 1 && node.grade <= 6) {
        document.getElementById('gradeFilter').value = 'elementary';
        currentGrade = 'elementary';
      } else if (node.grade >= 7 && node.grade <= 9) {
        document.getElementById('gradeFilter').value = 'middle';
        currentGrade = 'middle';
      } else if (node.grade >= 10) {
        document.getElementById('gradeFilter').value = 'high';
        currentGrade = 'high';
      }
      
      updateNodeList();
      
      // 选中节点
      setTimeout(() => {
        document.getElementById('nodeSelect').value = nodeIdFromURL;
        showPathForNode();
      }, 100);
    }
  }
});
</script>

</body>
</html>
