<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeachAny Gallery 诊断工具</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
    max-width: 1200px;
    margin: 40px auto;
    padding: 0 20px;
    background: #0f172a;
    color: #f1f5f9;
  }
  h1 { color: #60a5fa; }
  h2 { 
    color: #a78bfa; 
    margin-top: 40px;
    padding-bottom: 10px;
    border-bottom: 2px solid #334155;
  }
  .status {
    padding: 12px 16px;
    border-radius: 8px;
    margin: 10px 0;
    border-left: 4px solid;
  }
  .success { 
    background: rgba(34, 197, 94, 0.1); 
    border-color: #22c55e;
    color: #86efac;
  }
  .warning { 
    background: rgba(251, 191, 36, 0.1); 
    border-color: #fbbf24;
    color: #fde047;
  }
  .error { 
    background: rgba(239, 68, 68, 0.1); 
    border-color: #ef4444;
    color: #fca5a5;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 20px 0;
    background: rgba(30, 41, 59, 0.5);
    border-radius: 8px;
    overflow: hidden;
  }
  th, td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid #334155;
  }
  th {
    background: rgba(51, 65, 85, 0.5);
    color: #94a3b8;
    font-weight: 600;
  }
  button {
    padding: 10px 20px;
    border-radius: 6px;
    border: none;
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    color: white;
    font-weight: 600;
    cursor: pointer;
    margin: 5px;
  }
  button:hover {
    opacity: 0.9;
  }
  pre {
    background: rgba(30, 41, 59, 0.8);
    padding: 16px;
    border-radius: 8px;
    overflow-x: auto;
    font-size: 13px;
    color: #e2e8f0;
  }
  .refresh-btn {
    background: linear-gradient(135deg, #10b981, #06b6d4);
  }
</style>
</head>
<body>

<h1>🔍 TeachAny Gallery 诊断工具</h1>

<div style="margin: 20px 0;">
  <button onclick="runDiagnostics()">🔄 运行完整诊断</button>
  <button onclick="clearCache()" class="refresh-btn">🗑️ 清除浏览器缓存</button>
  <button onclick="window.location.reload(true)">↻ 强制刷新页面</button>
</div>

<div id="results"></div>

<script>
async function runDiagnostics() {
  const results = document.getElementById('results');
  results.innerHTML = '<div class="status warning">⏳ 正在运行诊断...</div>';
  
  let html = '';
  
  // 1. 检查Registry.json
  html += '<h2>📄 Registry.json 检查</h2>';
  try {
    const response = await fetch('./registry.json?t=' + Date.now());
    const registry = await response.json();
    
    const total = registry.courses.length;
    const official = registry.courses.filter(c => c.status === 'official').length;
    const community = registry.courses.filter(c => c.status === 'community').length;
    const mathHigh = registry.courses.filter(c => c.id && c.id.includes('math-high')).length;
    const mathElem = registry.courses.filter(c => c.id && c.id.includes('math-elem')).length;
    
    html += `<div class="status success">
      ✅ Registry加载成功<br>
      📊 总课件: ${total}<br>
      🏛️ 官方: ${official}<br>
      👥 社区: ${community}<br>
      🎓 高中数学: ${mathHigh}<br>
      🧮 小学数学: ${mathElem}
    </div>`;
    
    // 显示前5个高中数学课件
    const mathHighCourses = registry.courses.filter(c => c.id && c.id.includes('math-high')).slice(0, 5);
    html += '<h3>前5个高中数学课件:</h3><table>';
    html += '<tr><th>ID</th><th>名称</th><th>Status</th><th>Grade</th><th>Subject</th></tr>';
    mathHighCourses.forEach(c => {
      html += `<tr>
        <td>${c.id}</td>
        <td>${c.name}</td>
        <td>${c.status}</td>
        <td>${c.grade}</td>
        <td>${c.subject}</td>
      </tr>`;
    });
    html += '</table>';
    
  } catch (error) {
    html += `<div class="status error">❌ Registry加载失败: ${error.message}</div>`;
  }
  
  // 2. 检查DOM元素
  html += '<h2>🖼️ DOM元素检查</h2>';
  const officialGrid = document.getElementById('officialGrid');
  const communityGrid = document.getElementById('communityGrid');
  
  if (officialGrid) {
    const officialCards = officialGrid.querySelectorAll('.course-card');
    html += `<div class="status ${officialCards.length > 0 ? 'success' : 'warning'}">
      官方课件Grid: ✅ 存在<br>
      已渲染卡片: ${officialCards.length} 个
    </div>`;
  } else {
    html += '<div class="status error">❌ 找不到 officialGrid</div>';
  }
  
  if (communityGrid) {
    const communityCards = communityGrid.querySelectorAll('.course-card');
    const visibleCards = Array.from(communityCards).filter(c => c.style.display !== 'none').length;
    html += `<div class="status ${communityCards.length > 0 ? 'success' : 'error'}">
      社区课件Grid: ✅ 存在<br>
      已渲染卡片: ${communityCards.length} 个<br>
      可见卡片: ${visibleCards} 个
    </div>`;
    
    // 检查高中数学课件
    const mathHighCards = Array.from(communityCards).filter(c => 
      c.dataset.courseId && c.dataset.courseId.includes('math-high')
    );
    const visibleMathHigh = mathHighCards.filter(c => c.style.display !== 'none').length;
    
    html += `<div class="status ${mathHighCards.length > 0 ? 'success' : 'error'}">
      高中数学卡片: ${mathHighCards.length} 个<br>
      可见: ${visibleMathHigh} 个
    </div>`;
    
    if (mathHighCards.length > 0) {
      html += '<h3>前5个高中数学卡片状态:</h3><table>';
      html += '<tr><th>ID</th><th>名称</th><th>Display</th><th>Subject</th><th>Grade</th></tr>';
      mathHighCards.slice(0, 5).forEach(card => {
        html += `<tr>
          <td>${card.dataset.courseId}</td>
          <td>${card.dataset.courseName}</td>
          <td style="color: ${card.style.display === 'none' ? '#ef4444' : '#22c55e'}">${card.style.display || 'block'}</td>
          <td>${card.dataset.subject}</td>
          <td>${card.dataset.grade}</td>
        </tr>`;
      });
      html += '</table>';
    }
  } else {
    html += '<div class="status error">❌ 找不到 communityGrid</div>';
  }
  
  // 3. 检查筛选器状态
  html += '<h2>🔍 筛选器状态</h2>';
  const activeLevel = window.activeLevel || 'all';
  const activeSubject = window.activeSubject || 'all';
  const activeSearchQuery = window.activeSearchQuery || '';
  
  html += `<div class="status ${activeLevel === 'all' && activeSubject === 'all' ? 'success' : 'warning'}">
    学段筛选: ${activeLevel === 'all' ? '✅ 全部' : '⚠️ ' + activeLevel}<br>
    学科筛选: ${activeSubject === 'all' ? '✅ 全部' : '⚠️ ' + activeSubject}<br>
    搜索词: ${activeSearchQuery || '(无)'}
  </div>`;
  
  // 4. 浏览器缓存检查
  html += '<h2>💾 浏览器缓存检查</h2>';
  try {
    const cached = localStorage.getItem('teachany_registry_v3');
    if (cached) {
      const { timestamp } = JSON.parse(cached);
      const age = Date.now() - timestamp;
      const ageMin = Math.floor(age / 60000);
      html += `<div class="status warning">
        ⚠️ 发现缓存<br>
        缓存年龄: ${ageMin} 分钟<br>
        建议: 点击"清除浏览器缓存"按钮
      </div>`;
    } else {
      html += '<div class="status success">✅ 无缓存</div>';
    }
  } catch (e) {
    html += '<div class="status error">❌ 缓存检查失败: ' + e.message + '</div>';
  }
  
  // 5. 控制台日志
  html += '<h2>📝 建议</h2>';
  if (communityGrid && communityGrid.querySelectorAll('.course-card').length === 0) {
    html += `<div class="status error">
      ❌ 问题: 社区课件Grid中没有任何卡片!<br><br>
      可能原因:<br>
      1. Registry.json未正确加载<br>
      2. unified-loader.js未执行<br>
      3. JavaScript错误阻止了渲染<br><br>
      建议操作:<br>
      1. 打开浏览器开发者工具(F12)<br>
      2. 查看Console选项卡是否有错误<br>
      3. 查看Network选项卡确认registry.json是否加载<br>
      4. 点击"强制刷新页面"按钮
    </div>`;
  } else if (communityGrid) {
    const totalCards = communityGrid.querySelectorAll('.course-card').length;
    const visibleCards = Array.from(communityGrid.querySelectorAll('.course-card'))
      .filter(c => c.style.display !== 'none').length;
    
    if (visibleCards < totalCards) {
      html += `<div class="status warning">
        ⚠️ 部分卡片被筛选器隐藏<br>
        总卡片: ${totalCards}<br>
        可见: ${visibleCards}<br><br>
        建议: 重置所有筛选器(点击"全部"按钮)
      </div>`;
    } else {
      html += '<div class="status success">✅ 所有卡片正常显示!</div>';
    }
  }
  
  results.innerHTML = html;
}

function clearCache() {
  try {
    localStorage.removeItem('teachany_registry_v3');
    localStorage.removeItem('teachany_likes');
    sessionStorage.clear();
    alert('✅ 缓存已清除!请刷新页面。');
  } catch (e) {
    alert('❌ 清除缓存失败: ' + e.message);
  }
}

// 页面加载时自动运行
window.addEventListener('load', () => {
  setTimeout(runDiagnostics, 1000);
});
</script>

</body>
</html>
