<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeachAny 知识地图 · Knowledge Map v2</title>
<style>
:root {
  --bg: #0f172a;
  --bg2: #1e293b;
  --card: rgba(30, 41, 59, 0.85);
  --border: rgba(148, 163, 184, 0.15);
  --text: #f8fafc;
  --dim: #94a3b8;
  --dimmer: #64748b;
  --primary: #3b82f6;
  --secondary: #8b5cf6;
  --accent: #f59e0b;
  --success: #10b981;
  --danger: #ef4444;
  --cyan: #06b6d4;
  --pink: #ec4899;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'PingFang SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
}

/* Top Bar */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 10;
}
.top-bar h1 {
  font-size: 20px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.nav-links { display: flex; gap: 8px; }
.nav-links a {
  color: var(--dim);
  text-decoration: none;
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 14px;
  transition: all 0.2s;
}
.nav-links a:hover, .nav-links a.active {
  color: var(--text);
  background: rgba(59,130,246,0.15);
}

/* Subject Tabs */
.subject-tabs {
  display: flex;
  gap: 6px;
  padding: 10px 24px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  flex-wrap: wrap;
}
.subject-tab {
  padding: 5px 12px;
  border-radius: 16px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--dim);
  cursor: pointer;
  font-size: 12px;
  white-space: nowrap;
  transition: all 0.2s;
}
.subject-tab:hover { border-color: var(--primary); color: var(--text); }
.subject-tab.active {
  background: var(--primary);
  border-color: var(--primary);
  color: white;
}
.stage-label {
  padding: 5px 8px;
  font-size: 11px;
  color: var(--dimmer);
  font-weight: 600;
  align-self: center;
}

/* SVG Canvas */
#tree-container {
  width: 100%;
  height: calc(100vh - 100px);
  position: relative;
}
svg { width: 100%; height: 100%; }

/* Nodes */
.node-group { cursor: pointer; }
.node-circle {
  stroke-width: 2.5;
  transition: all 0.3s;
}
.node-group:hover .node-circle {
  stroke-width: 4;
  filter: drop-shadow(0 0 12px rgba(59,130,246,0.5));
}
.node-label {
  font-size: 12px;
  font-family: 'PingFang SC', sans-serif;
  fill: var(--text);
  text-anchor: middle;
  pointer-events: none;
}
.node-grade {
  font-size: 10px;
  fill: var(--dimmer);
  text-anchor: middle;
  pointer-events: none;
}

/* Links */
.link {
  stroke: rgba(148,163,184,0.2);
  stroke-width: 1.5;
  fill: none;
}
.link-prerequisite { stroke: rgba(148,163,184,0.3); stroke-width: 2; }
.link-extends { stroke: rgba(139,92,246,0.25); stroke-dasharray: 6 3; }
.link-parallel { stroke: rgba(245,158,11,0.2); stroke-dasharray: 3 3; }

/* Tooltip */
.tooltip {
  position: absolute;
  background: var(--card);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  max-width: 280px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
  z-index: 100;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.tooltip.visible { opacity: 1; pointer-events: auto; }
.tooltip h3 { font-size: 15px; margin-bottom: 6px; }
.tooltip .meta { font-size: 12px; color: var(--dim); margin-bottom: 8px; }
.tooltip .status-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
}
.tooltip .badge-active { background: rgba(16,185,129,0.2); color: var(--success); }
.tooltip .badge-gap { background: rgba(239,68,68,0.2); color: var(--danger); }
.tooltip .prereqs { font-size: 12px; color: var(--dim); margin-top: 6px; }
.tooltip .course-link {
  display: block;
  margin-top: 10px;
  padding: 6px 12px;
  background: var(--primary);
  color: white;
  border-radius: 6px;
  text-align: center;
  text-decoration: none;
  font-size: 13px;
  font-weight: 600;
  pointer-events: auto;
}
.tooltip .course-link:hover { filter: brightness(1.15); }
.tooltip .gap-msg {
  margin-top: 8px;
  padding: 6px 10px;
  background: rgba(239,68,68,0.1);
  border-radius: 6px;
  font-size: 12px;
  color: var(--danger);
}

/* Legend */
.legend {
  position: absolute;
  bottom: 20px;
  left: 20px;
  background: var(--card);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  font-size: 12px;
  z-index: 10;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 4px 0;
}
.legend-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 2px solid;
  flex-shrink: 0;
}
.legend-line {
  width: 24px;
  height: 2px;
  flex-shrink: 0;
}

/* Stats bar */
.stats-bar {
  position: absolute;
  top: 12px;
  right: 20px;
  display: flex;
  gap: 16px;
  z-index: 10;
}
.stat-chip {
  background: var(--card);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 13px;
}
.stat-chip strong { color: var(--accent); }
.stat-chip.clickable { cursor: pointer; transition: all 0.2s; }
.stat-chip.clickable:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.stat-chip.clickable:hover strong { color: #fff; }
@keyframes pulse-ring {
  0%   { r: 22; opacity: 0.8; }
  100% { r: 40; opacity: 0; }
}
.node-pulse { pointer-events: none; }
.refresh-btn {
  background: var(--card);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--accent);
  font-weight: 600;
}
.refresh-btn:hover { background: var(--accent); color: #fff; }
.refresh-btn.spinning { animation: spin 0.8s linear infinite; pointer-events: none; opacity: 0.6; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* Like Button */
.ta-like-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 16px;
  background: rgba(148,163,184,0.1); color: #94a3b8;
  border: 1px solid rgba(148,163,184,0.15);
  cursor: pointer; font-size: 13px;
  transition: all 0.2s; white-space: nowrap;
}
.ta-like-btn:hover {
  background: rgba(239,68,68,0.12);
  border-color: rgba(239,68,68,0.3);
  color: #fca5a5;
}
.ta-like-btn.liked {
  background: rgba(239,68,68,0.15);
  border-color: rgba(239,68,68,0.3);
  color: #f87171;
}
.ta-like-btn .like-icon { font-size: 14px; }
.ta-like-btn .like-count { font-weight: 600; font-size: 12px; }
</style>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js" integrity="sha384-CjloA8y00+1SDAUkjs099PVfnY2KmDC2BZnws9kh8D/lX1s46w6EPhpXdqMfjK6i" crossorigin="anonymous"></script>
<script src="./scripts/courseware-importer.js"></script>
<script src="./scripts/courseware-hub.js"></script>
<script>
/* ─── 数据源配置 ─── */
const TREE_API_BASE = 'https://api.github.com/repos/weponusa/teachany/contents/';
const TREE_RAW_BASE = 'https://raw.githubusercontent.com/weponusa/teachany/main/';
const IS_GITHUB_PAGES = location.hostname.includes('github.io');

/**
 * 从 GitHub 获取 JSON 文件（零缓存延迟策略）
 * 优先级：GitHub API（无缓存） → raw URL（5分钟缓存） → Pages 相对路径
 * GitHub API 返回 base64 编码内容，无 CDN 缓存，push 后立即可读
 */
async function fetchTreeJSON(relativePath) {
  if (IS_GITHUB_PAGES) {
    // 策略 1：GitHub Contents API — 零缓存延迟
    try {
      const apiUrl = TREE_API_BASE + relativePath + '?t=' + Date.now();
      const resp = await fetch(apiUrl, {
        cache: 'no-store',
        headers: { 'Accept': 'application/vnd.github.v3+json' }
      });
      if (resp.ok) {
        const meta = await resp.json();
        // API 返回 base64 编码的内容
        if (meta.content) {
          // atob 返回 Latin-1，需要用 TextDecoder 正确处理 UTF-8 中文
          const binaryStr = atob(meta.content.replace(/\n/g, ''));
          const bytes = new Uint8Array(binaryStr.length);
          for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
          const decoded = new TextDecoder('utf-8').decode(bytes);
          console.log('[KnowledgeMap] ✅ via GitHub API (no cache delay)');
          return JSON.parse(decoded);
        }
        // 文件过大时 API 不返回 content，回退到 download_url
        if (meta.download_url) {
          const rawResp = await fetch(meta.download_url, { cache: 'no-store' });
          if (rawResp.ok) {
            console.log('[KnowledgeMap] ✅ via API download_url');
            return rawResp.json();
          }
        }
      }
      // API 限流（403）或其他错误，回退
      console.warn('[KnowledgeMap] API fallback, status:', resp.status);
    } catch (e) {
      console.warn('[KnowledgeMap] API error, falling back:', e.message);
    }

    // 策略 2：raw.githubusercontent.com — 有 5 分钟 CDN 缓存
    try {
      const rawUrl = TREE_RAW_BASE + relativePath + '?v=' + Date.now();
      const resp = await fetch(rawUrl, { cache: 'no-store' });
      if (resp.ok) {
        console.log('[KnowledgeMap] ⚠️ via raw URL (may have ~5min cache)');
        return resp.json();
      }
    } catch (e) {
      console.warn('[KnowledgeMap] raw URL error:', e.message);
    }
  }

  // 策略 3：本地相对路径（本地开发 / 最终兜底）
  const localUrl = relativePath + '?v=' + Date.now();
  const resp = await fetch(localUrl, { cache: 'no-store' });
  if (resp.ok) {
    console.log('[KnowledgeMap] via local path');
    return resp.json();
  }
  throw new Error('All fetch strategies failed for ' + relativePath);
}

const TREES = [
  // 小学
  { file: 'data/trees/chinese-elementary.json', emoji: '📖', label: '小学语文' },
  { file: 'data/trees/math-elementary.json', emoji: '🔢', label: '小学数学' },
  { file: 'data/trees/english-elementary.json', emoji: '🔤', label: '小学英语' },
  // 初中
  { file: 'data/trees/chinese-middle.json', emoji: '📝', label: '初中语文' },
  { file: 'data/trees/math-middle.json', emoji: '📐', label: '初中数学' },
  { file: 'data/trees/english-middle.json', emoji: '🅰️', label: '初中英语' },
  { file: 'data/trees/physics-middle.json', emoji: '⚡', label: '初中物理' },
  { file: 'data/trees/chemistry-middle.json', emoji: '🧪', label: '初中化学' },
  { file: 'data/trees/biology-middle.json', emoji: '🌱', label: '初中生物' },
  { file: 'data/trees/geography-middle.json', emoji: '🗺️', label: '初中地理' },
  { file: 'data/trees/history-middle.json', emoji: '📜', label: '初中历史' },
  // 高中
  { file: 'data/trees/chinese-high.json', emoji: '📚', label: '高中语文' },
  { file: 'data/trees/math-high.json', emoji: '∑', label: '高中数学' },
  { file: 'data/trees/english-high.json', emoji: '🌐', label: '高中英语' },
  { file: 'data/trees/physics-high.json', emoji: '⚛️', label: '高中物理' },
  { file: 'data/trees/chemistry-high.json', emoji: '⚗️', label: '高中化学' },
  { file: 'data/trees/biology-high.json', emoji: '🧬', label: '高中生物' },
  { file: 'data/trees/geography-high.json', emoji: '🌍', label: '高中地理' },
  { file: 'data/trees/history-high.json', emoji: '🏛️', label: '高中历史' },
  { file: 'data/trees/info-tech-high.json', emoji: '💻', label: '高中信息技术' }
];

let currentTree = null;
let simulation = null;

// Build subject tabs with stage labels
const tabsEl = document.getElementById('subjectTabs');
const stageBreaks = [0, 3, 11]; // indices where new stage starts
const stageNames = ['小学', '初中', '高中'];
TREES.forEach((t, i) => {
  const stageIdx = stageBreaks.indexOf(i);
  if (stageIdx !== -1) {
    const label = document.createElement('span');
    label.className = 'stage-label';
    label.textContent = stageNames[stageIdx];
    tabsEl.appendChild(label);
  }
  const btn = document.createElement('button');
  btn.className = 'subject-tab' + (i === 0 ? ' active' : '');
  btn.textContent = t.emoji + ' ' + t.label.replace(/小学|初中|高中/, '');
  btn.onclick = () => loadTree(i);
  tabsEl.appendChild(btn);
});

async function loadTree(index) {
  // Update tab active state
  document.querySelectorAll('.subject-tab').forEach((t, i) => {
    t.classList.toggle('active', i === index);
  });

  try {
    console.log(`[KnowledgeMap] Loading: ${TREES[index].label} (${TREES[index].file})`);

    // 并行加载：知识树 + CoursewareHub 初始化
    const [treeData] = await Promise.all([
      fetchTreeJSON(TREES[index].file),
      window.TeachAnyHub ? TeachAnyHub.init() : Promise.resolve(),
    ]);
    currentTree = treeData;

    // 统计 active 节点
    const allNodes = currentTree.domains.flatMap(d => d.nodes);
    const activeNodes = allNodes.filter(n => n.status === 'active' && n.courses && n.courses.length);
    // 通过 Hub 检测额外有课件的节点（社区/用户课件自动接入）
    const hubCoveredNodes = allNodes.filter(n => {
      if (n.status === 'active' && n.courses && n.courses.length) return false; // 已计入 active
      return window.TeachAnyHub && TeachAnyHub.hasAnyCourseware(n.id);
    });
    console.log(`[KnowledgeMap] ${TREES[index].label}: ${allNodes.length} nodes, ${activeNodes.length} active, ${hubCoveredNodes.length} hub-covered`);

    renderTree(currentTree);
  } catch (err) {
    console.error('[KnowledgeMap] Failed to load tree:', err);
  }
}

function renderTree(tree) {
  const svg = d3.select('#treeSvg');
  svg.selectAll('*').remove();

  const container = document.getElementById('tree-container');
  const W = container.clientWidth;
  const H = container.clientHeight;

  // Build nodes and links from tree data
  const nodes = [];
  const links = [];
  const nodeMap = {};

  tree.domains.forEach(domain => {
    domain.nodes.forEach(node => {
      const n = {
        id: node.id,
        name: node.name,
        grade: node.grade,
        domain: domain.name,
        domainColor: domain.color,
        status: node.status,
        courses: node.courses || [],
        prerequisites: node.prerequisites || [],
        extends: node.extends || [],
        parallel: node.parallel || []
      };
      nodes.push(n);
      nodeMap[node.id] = n;
    });
  });

  // Create links
  nodes.forEach(n => {
    n.prerequisites.forEach(pid => {
      if (nodeMap[pid]) {
        links.push({ source: pid, target: n.id, type: 'prerequisite' });
      }
    });
    n.extends.forEach(eid => {
      if (nodeMap[eid]) {
        links.push({ source: n.id, target: eid, type: 'extends' });
      }
    });
    n.parallel.forEach(pid => {
      if (nodeMap[pid]) {
        // avoid duplicate parallel links
        const exists = links.find(l =>
          l.type === 'parallel' &&
          ((l.source === n.id && l.target === pid) || (l.source === pid && l.target === n.id))
        );
        if (!exists) links.push({ source: n.id, target: pid, type: 'parallel' });
      }
    });
  });

  // Check user-uploaded courses (必须在 Stats 之前，避免 TDZ 错误)
  const userCourses = window.TeachAnyImporter ? TeachAnyImporter.getUserCourses() : [];
  // 使用 isUserCourseNode 支持别名映射匹配（解决 node_id 不一致问题）
  const hasUserCourse = (nodeId) => window.TeachAnyImporter ? TeachAnyImporter.isUserCourseNode(nodeId) : false;
  // Hub 通用检测：只要有任何来源的课件就算有
  const hubHasCourse = (nodeId) => window.TeachAnyHub ? TeachAnyHub.hasAnyCourseware(nodeId) : false;
  // 统一判断：节点是否有课件（合并所有来源）
  const nodeHasAnyCourse = (n) => {
    if (n.status === 'active' && n.courses && n.courses.length) return true;
    if (hasUserCourse(n.id)) return true;
    if (hubHasCourse(n.id)) return true;
    return false;
  };
  // 暴露到全局，供全局 showTooltip / onNodeClick 使用
  window.nodeHasAnyCourse = nodeHasAnyCourse;
  // 统计每个 node_id 下的课件数量
  const nodeCourseCounts = {};
  userCourses.forEach(c => {
    const nid = c.manifest?.node_id;
    if (nid) nodeCourseCounts[nid] = (nodeCourseCounts[nid] || 0) + 1;
  });

  // Stats — 使用 nodeHasAnyCourse() 统一统计所有来源
  const totalNodes = nodes.length;
  const officialNodes = nodes.filter(n => n.status === 'active' && n.courses && n.courses.length).length;
  const userOnlyNodes = nodes.filter(n => !(n.status === 'active' && n.courses && n.courses.length) && hasUserCourse(n.id)).length;
  const hubOnlyNodes = nodes.filter(n => {
    if (n.status === 'active' && n.courses && n.courses.length) return false;
    if (hasUserCourse(n.id)) return false;
    return hubHasCourse(n.id);
  }).length;
  const coveredNodes = officialNodes + userOnlyNodes + hubOnlyNodes;
  const gapNodes = totalNodes - coveredNodes;

  // 记录所有有课件的节点列表（包括 Hub 覆盖），供点击跳转
  const activeNodeList = nodes.filter(n => nodeHasAnyCourse(n));
  let focusActiveIndex = 0; // 轮转索引

  const statParts = [
    `<div class="stat-chip">节点 <strong>${totalNodes}</strong></div>`,
    `<div class="stat-chip clickable" id="jumpActiveBtn" title="点击定位到有课件的节点">有课件 <strong>${coveredNodes}</strong> 📍</div>`,
  ];
  if (userOnlyNodes > 0) {
    statParts.push(`<div class="stat-chip">我的课件 <strong style="color:#fbbf24;">${userOnlyNodes}</strong></div>`);
  }
  if (hubOnlyNodes > 0) {
    statParts.push(`<div class="stat-chip">社区接入 <strong style="color:#06b6d4;">${hubOnlyNodes}</strong></div>`);
  }
  statParts.push(`<div class="stat-chip">待创建 <strong style="color:var(--danger);">${gapNodes}</strong></div>`);
  statParts.push(`<div class="stat-chip" style="font-size:11px;opacity:0.6;">更新于 ${new Date().toLocaleTimeString('zh-CN')}</div>`);
  statParts.push(`<div class="stat-chip">覆盖率 <strong>${totalNodes > 0 ? Math.round(coveredNodes/totalNodes*100) : 0}%</strong></div>`);
  statParts.push(`<button class="refresh-btn" onclick="refreshCurrentTree()" title="刷新知识地图数据">🔄</button>`);

  document.getElementById('statsBar').innerHTML = statParts.join('\n    ');

  // D3 force simulation
  const g = svg.append('g');

  // Zoom
  const zoom = d3.zoom()
    .scaleExtent([0.3, 3])
    .on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);

  // Arrow markers
  const defs = svg.append('defs');
  defs.append('marker')
    .attr('id', 'arrow-prereq')
    .attr('viewBox', '0 -5 10 10')
    .attr('refX', 28).attr('refY', 0)
    .attr('markerWidth', 6).attr('markerHeight', 6)
    .attr('orient', 'auto')
    .append('path').attr('d', 'M0,-5L10,0L0,5')
    .attr('fill', 'rgba(148,163,184,0.4)');

  // Links
  const linkSel = g.selectAll('.link')
    .data(links)
    .enter().append('line')
    .attr('class', d => 'link link-' + d.type)
    .attr('marker-end', d => d.type === 'prerequisite' ? 'url(#arrow-prereq)' : '');

  // Node groups
  const nodeSel = g.selectAll('.node-group')
    .data(nodes, d => d.id)
    .enter().append('g')
    .attr('class', 'node-group')
    .call(d3.drag()
      .on('start', dragStart)
      .on('drag', dragging)
      .on('end', dragEnd))
    .on('mouseenter', showTooltip)
    .on('mousemove', moveTooltip)
    .on('mouseleave', hideTooltip)
    .on('click', onNodeClick);

  // Circle — 使用 nodeHasAnyCourse() 统一检测
  nodeSel.append('circle')
    .attr('class', 'node-circle')
    .attr('r', d => nodeHasAnyCourse(d) ? 22 : 18)
    .attr('fill', d => {
      if (d.status === 'active') return hexToRgba(d.domainColor, 0.25);
      if (hasUserCourse(d.id)) return hexToRgba(d.domainColor, 0.15);
      if (hubHasCourse(d.id)) return hexToRgba(d.domainColor, 0.15);
      // 无课件节点：使用所在域颜色的很浅背景（5% 透明度），让域归属一眼可见
      return hexToRgba(d.domainColor, 0.05);
    })
    .attr('stroke', d => {
      if (d.status === 'active') return d.domainColor;
      if (hasUserCourse(d.id)) return d.domainColor;
      if (hubHasCourse(d.id)) return d.domainColor;
      // 无课件节点：使用所在域颜色的 55% 透明度，比有课件的稍淡但仍能看出域
      return hexToRgba(d.domainColor, 0.55);
    })
    .attr('stroke-dasharray', d => {
      if (nodeHasAnyCourse(d)) return 'none';
      return '4 3';
    })
    .attr('stroke-width', d => {
      // Hub 社区接入节点用双线样式区分
      if (!(d.status === 'active' && d.courses && d.courses.length) && !hasUserCourse(d.id) && hubHasCourse(d.id)) return 3.5;
      return 2.5;
    });

  // Status icon — 区分来源
  nodeSel.append('text')
    .attr('text-anchor', 'middle')
    .attr('dy', '0.35em')
    .attr('font-size', '14px')
    .text(d => {
      if (d.status === 'active') return '✅';
      if (hasUserCourse(d.id)) return '📂';
      if (hubHasCourse(d.id)) return '🌐';
      return '📝';
    });

  // Label
  nodeSel.append('text')
    .attr('class', 'node-label')
    .attr('dy', 38)
    .text(d => d.name);

  // Grade
  nodeSel.append('text')
    .attr('class', 'node-grade')
    .attr('dy', 52)
    .text(d => d.grade + '年级');

  // Simulation
  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(120).strength(0.6))
    .force('charge', d3.forceManyBody().strength(-400))
    .force('center', d3.forceCenter(W / 2, H / 2))
    .force('collision', d3.forceCollide().radius(50))
    .force('x', d3.forceX(W / 2).strength(0.05))
    .force('y', d3.forceY(H / 2).strength(0.05))
    .on('tick', () => {
      linkSel
        .attr('x1', d => d.source.x)
        .attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x)
        .attr('y2', d => d.target.y);
      nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
    });

  // Initial zoom to fit
  setTimeout(() => {
    svg.call(zoom.transform, d3.zoomIdentity.translate(0, 0).scale(0.9));

    // 绑定"有课件"跳转按钮
    const jumpBtn = document.getElementById('jumpActiveBtn');
    if (jumpBtn && activeNodeList.length > 0) {
      jumpBtn.addEventListener('click', () => {
        const target = activeNodeList[focusActiveIndex % activeNodeList.length];
        focusActiveIndex++;
        if (!target || target.x == null) return;

        const container = document.getElementById('tree-container');
        const W = container.clientWidth;
        const H = container.clientHeight;
        const scale = 1.8;
        const tx = W / 2 - scale * target.x;
        const ty = H / 2 - scale * target.y;

        svg.transition().duration(600)
          .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));

        // 脉冲高亮
        const nodeG = g.selectAll('.node-group').filter(d => d.id === target.id);
        nodeG.selectAll('.node-pulse').remove();
        nodeG.append('circle')
          .attr('class', 'node-pulse')
          .attr('r', 22)
          .attr('fill', 'none')
          .attr('stroke', target.domainColor || '#3b82f6')
          .attr('stroke-width', 3)
          .attr('opacity', 0.8)
          .transition().duration(900).ease(d3.easeLinear)
          .attr('r', 42)
          .attr('opacity', 0)
          .on('end', function() { d3.select(this).remove(); });

        // 更新按钮文字提示
        if (activeNodeList.length > 1) {
          jumpBtn.title = `点击切换下一个有课件的节点（${focusActiveIndex % activeNodeList.length + 1}/${activeNodeList.length}）`;
        }
      });
    } else if (jumpBtn) {
      jumpBtn.style.opacity = '0.4';
      jumpBtn.style.cursor = 'default';
      jumpBtn.title = '暂无有课件的节点';
    }
  }, 500);
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// Drag handlers
function dragStart(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragging(event, d) { d.fx = event.x; d.fy = event.y; }
function dragEnd(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null; d.fy = null;
}

// Tooltip
const tooltip = document.getElementById('tooltip');

// ── Tooltip 交互（固定定位 + 延迟隐藏，确保按钮可点击）──

let tooltipLocked = false;   // tooltip 被锁定（用户鼠标在 tooltip 上）
let activeNodeData = null;   // 当前显示 tooltip 的节点数据

function showTooltip(event, d) {
  clearTimeout(tooltip._hideTimer);
  activeNodeData = d;

  let html = `<h3>${d.name}</h3>`;
  html += `<div class="meta">${d.domain} · ${d.grade}年级</div>`;

  // ── 统一通过 Hub 获取所有课件（已按 likes 降序排列） ──
  const hubCourses = window.TeachAnyHub ? TeachAnyHub.getAllCoursesForNode(d.id) : [];
  const hubCount = hubCourses.length;

  // 同时保留旧逻辑作为 fallback（Hub 未初始化时）
  const userCourses = window.TeachAnyImporter ? TeachAnyImporter.getTopCoursesForTreeNode(d.id) : [];
  const hasUserCourses = userCourses.length > 0;
  const communityCourses = window.TeachAnyCommunity ? TeachAnyCommunity.getTopCommunityCourses(d.id, 5) : [];
  const hasCommunity = communityCourses.length > 0;

  // ── 状态徽章（基于统一检测） ──
  const hasAnyCourse = nodeHasAnyCourse(d);
  if (hasAnyCourse) {
    if (d.status === 'active' && d.courses && d.courses.length) {
      html += `<span class="status-badge badge-active">✅ 有课件</span>`;
    } else if (hasUserCourses) {
      html += `<span class="status-badge badge-active">📂 我的课件</span>`;
    } else if (hubCount > 0) {
      html += `<span class="status-badge badge-active">🌐 社区接入</span>`;
    } else {
      html += `<span class="status-badge badge-active">✅ 有课件</span>`;
    }
  } else {
    html += `<span class="status-badge badge-gap">📝 待创建</span>`;
  }

  // ── 来源统计行 ──
  const statParts = [];

  if (hubCount > 0) {
    // Hub 模式：显示聚合统计
    const officialCount = hubCourses.filter(c => c.source === 'official').length;
    const communityRegCount = hubCourses.filter(c => c.source === 'community_registry').length;
    const communitySharedCount = hubCourses.filter(c => c.source === 'community_shared').length;
    const userCount = hubCourses.filter(c => c.source === 'user').length;

    if (officialCount > 0) statParts.push(`📋 官方 ×${officialCount}`);
    if (communityRegCount > 0) statParts.push(`🔖 社区精选 ×${communityRegCount}`);
    if (communitySharedCount > 0) statParts.push(`🌐 社区共享 ×${communitySharedCount}`);
    if (userCount > 0) statParts.push(`📂 我的 ×${userCount}`);

    // 总 likes 数
    const totalLikes = hubCourses.reduce((sum, c) => sum + (c.likes || 0), 0);
    if (totalLikes > 0) statParts.push(`❤️ ${totalLikes}`);

    // 总课件数
    if (hubCount > 1) statParts.push(`共 ${hubCount} 个课件`);
  } else {
    // Fallback：Hub 未初始化时走旧逻辑
    if (d.status === 'active' && d.courses.length) {
      statParts.push(`📋 官方 ×${d.courses.length}`);
    }
    if (hasCommunity) statParts.push(`🌐 社区 ×${communityCourses.length}`);
    if (hasUserCourses) statParts.push(`📂 我的 ×${userCourses.length}`);

    // 爱心数（旧逻辑）
    let totalLikes = 0;
    if (window.TeachAnyRegistry) {
      d.courses.forEach(c => {
        const cid = typeof c === 'string' ? c.split('/').pop() : '';
        totalLikes += TeachAnyRegistry.getRegistryLikeCount(cid);
      });
    }
    if (window.TeachAnyImporter) {
      userCourses.forEach(c => { totalLikes += TeachAnyImporter.getCourseLikes(c.id); });
    }
    if (totalLikes > 0) statParts.push(`❤️ ${totalLikes}`);
  }

  // 星标推荐
  if (window.TeachAnyFeatured) {
    const featuredStats = TeachAnyFeatured.getFeaturedStatsForNode(d.id);
    if (featuredStats.total > 0) {
      if (featuredStats.approved > 0) statParts.push(`⭐ 推荐 ×${featuredStats.approved}`);
      if (featuredStats.starred > 0) statParts.push(`🔸 待审核 ×${featuredStats.starred}`);
    }
  }

  if (statParts.length > 0) {
    html += `<div class="meta" style="margin-top:4px;">${statParts.join(' · ')}</div>`;
  }

  // ── 前置知识 ──
  if (d.prerequisites.length) {
    html += `<div class="prereqs">前置知识：${d.prerequisites.join('、')}</div>`;
  }

  // ── 课件列表（始终展示列表+心标，用户点选进入） ──
  if (hubCount > 0) {
    html += `<div style="margin-top:8px;font-size:12px;color:var(--dim);">课件列表${hubCount > 1 ? '（按 ❤️ 排序）' : ''}：</div>`;
    html += `<div style="max-height:160px;overflow-y:auto;margin-top:4px;">`;
    hubCourses.forEach((c, idx) => {
      const sourceIcon = { official: '📋', community_registry: '🔖', community_shared: '🌐', user: '📂' }[c.source] || '📚';
      const likeBadge = c.likes > 0 ? ` <span style="color:#f87171;">❤️${c.likes}</span>` : ' <span style="color:var(--dimmer);">❤️0</span>';
      const isBest = idx === 0 && hubCount > 1 ? ' <span style="color:var(--accent);">👑</span>' : '';
      const courseUrl = c.url || (c.path ? `./${c.path}/index.html` : '');
      if (courseUrl) {
        html += `<a href="${courseUrl}" target="_blank" onclick="event.preventDefault();safeOpenCourseUrl('${courseUrl.replace(/'/g, "\\'")}')"
          style="display:flex;align-items:center;gap:6px;padding:6px 10px;margin:3px 0;border-radius:6px;font-size:13px;color:var(--text);text-decoration:none;background:rgba(148,163,184,0.08);transition:all 0.2s;pointer-events:auto;border:1px solid transparent;"
          onmouseover="this.style.background='rgba(59,130,246,0.15)';this.style.borderColor='rgba(59,130,246,0.3)'"
          onmouseout="this.style.background='rgba(148,163,184,0.08)';this.style.borderColor='transparent'"
        ><span>${sourceIcon}</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${c.name}</span>${likeBadge}${isBest}</a>`;
      }
    });
    html += `</div>`;
  } else if (d.status === 'active' && d.courses.length) {
    // Fallback：用 tree 中的课件列表
    html += `<div style="margin-top:8px;font-size:12px;color:var(--dim);">课件列表：</div>`;
    html += `<div style="max-height:160px;overflow-y:auto;margin-top:4px;">`;
    d.courses.forEach(courseId => {
      const courseUrl = './examples/' + courseId + '/index.html';
      const likesCount = window.TeachAnyRegistry ? TeachAnyRegistry.getRegistryLikeCount(courseId) : 0;
      const likeBadge = likesCount > 0 ? ` <span style="color:#f87171;">❤️${likesCount}</span>` : ' <span style="color:var(--dimmer);">❤️0</span>';
      html += `<a href="${courseUrl}" target="_blank" onclick="event.preventDefault();safeOpenCourseUrl('${courseUrl}')"
        style="display:flex;align-items:center;gap:6px;padding:6px 10px;margin:3px 0;border-radius:6px;font-size:13px;color:var(--text);text-decoration:none;background:rgba(148,163,184,0.08);transition:all 0.2s;pointer-events:auto;border:1px solid transparent;"
        onmouseover="this.style.background='rgba(59,130,246,0.15)';this.style.borderColor='rgba(59,130,246,0.3)'"
        onmouseout="this.style.background='rgba(148,163,184,0.08)';this.style.borderColor='transparent'"
      ><span>📋</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${courseId}</span>${likeBadge}</a>`;
    });
    html += `</div>`;
  }

  tooltip.innerHTML = html;

  // 为有用户课件的节点或 gap 节点添加上传按钮
  if (window.TeachAnyImporter && (hasUserCourses || !hasAnyCourse)) {
    TeachAnyImporter.addTreeUploadButton(d, tooltip);
  }

  // 渲染社区共享课件列表（仅在 Hub 未覆盖时走旧逻辑）
  if (hubCount === 0 && window.TeachAnyCommunity && hasCommunity) {
    TeachAnyCommunity.renderCommunityCoursesInTooltip(d.id, tooltip);
  }

  // 定位
  positionTooltipAtNode(event, d);
  tooltip.classList.add('visible');
}

function positionTooltipAtNode(event, d) {
  const container = document.getElementById('tree-container');
  const rect = container.getBoundingClientRect();
  const svgEl = document.getElementById('treeSvg');
  const gEl = svgEl.querySelector('g');
  const ctm = gEl ? gEl.getCTM() : null;

  let x, y;
  if (ctm && d.x != null && d.y != null) {
    // 将节点的模拟坐标经由 SVG CTM 变换为屏幕坐标，再转为容器内相对坐标
    const screenX = ctm.a * d.x + ctm.c * d.y + ctm.e;
    const screenY = ctm.b * d.x + ctm.d * d.y + ctm.f;
    x = screenX - rect.left + 28;  // 紧贴节点右侧
    y = screenY - rect.top - 20;
  } else {
    // fallback：用鼠标位置
    x = event.clientX - rect.left + 12;
    y = event.clientY - rect.top - 20;
  }

  // 边界修正
  const tw = 290; // tooltip 大致宽度
  const th = 200; // tooltip 大致高度
  if (x + tw > rect.width) x = x - tw - 56; // 翻到节点左侧
  if (y + th > rect.height) y = rect.height - th - 10;
  if (y < 10) y = 10;

  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function moveTooltip(event) {
  // 不再跟随鼠标移动——tooltip 固定在节点旁边
  // 仅在 tooltip 尚未显示时定位（已由 showTooltip 处理）
}

function hideTooltip() {
  // 如果 tooltip 被锁定（鼠标在 tooltip 上），不隐藏
  if (tooltipLocked) return;

  clearTimeout(tooltip._hideTimer);
  tooltip._hideTimer = setTimeout(() => {
    // 再次检查：用户是否已经把鼠标移到 tooltip 上
    if (!tooltipLocked && !tooltip.matches(':hover')) {
      tooltip.classList.remove('visible');
      activeNodeData = null;
    }
  }, 350); // 350ms 延迟，给用户充足时间移到 tooltip
}

// tooltip 鼠标进入/离开
tooltip.addEventListener('mouseenter', function() {
  tooltipLocked = true;
  clearTimeout(this._hideTimer);
});
tooltip.addEventListener('mouseleave', function() {
  tooltipLocked = false;
  clearTimeout(this._hideTimer);
  // 延迟隐藏：给用户足够时间回到 tooltip 或点击链接
  this._hideTimer = setTimeout(() => {
    if (!tooltipLocked && !tooltip.matches(':hover')) {
      tooltip.classList.remove('visible');
      tooltip.style.borderColor = '';
      tooltip.style.boxShadow = '';
      activeNodeData = null;
    }
  }, 400);
});

// ── TeachAny 导航白名单 ──
const TEACHANY_NAV_WHITELIST = [
  /^\.\.?\//,                                          // 相对路径
  /^#/,                                                // 锚点
  /^imported-course\.html/,                            // 用户课件查看器
  /^https?:\/\/weponusa\.github\.io\/teachany\//,      // TeachAny Pages
  /^https?:\/\/github\.com\/weponusa\/teachany\//,     // TeachAny GitHub
];

function isTeachAnyUrl(url) {
  if (!url || url === '#') return false;
  url = url.trim();
  // 相对路径（不含协议前缀）都允许
  if (!/^[a-z]+:/i.test(url)) return true;
  return TEACHANY_NAV_WHITELIST.some(re => re.test(url));
}

function safeOpenCourseUrl(url) {
  if (!url || url === '#') return;
  if (isTeachAnyUrl(url)) {
    window.open(url, '_blank', 'noopener');
  } else {
    console.warn('[TeachAny] 已拦截非课件链接:', url);
  }
}

function onNodeClick(event, d) {
  // 点击节点 → 显示课件列表，用户从列表选择进入
  // 只做两件事：展示 tooltip、锁定不让它消失
  showTooltip(event, d);
  tooltipLocked = true;
  clearTimeout(tooltip._hideTimer);
  tooltip.style.borderColor = 'var(--primary)';
  tooltip.style.boxShadow = '0 0 20px rgba(59,130,246,0.3)';
}

// 刷新当前知识地图数据（手动触发，绕过一切缓存）
async function refreshCurrentTree() {
  const btn = document.querySelector('.refresh-btn');
  if (btn) { btn.classList.add('spinning'); btn.disabled = true; }
  try {
    const activeIdx = Array.from(document.querySelectorAll('.subject-tab')).findIndex(t => t.classList.contains('active'));
    if (activeIdx >= 0) await loadTree(activeIdx);
  } finally {
    if (btn) { btn.classList.remove('spinning'); btn.disabled = false; }
  }
}

// Load initial tree
loadTree(0);

// 预取社区课件索引（后台异步，不阻塞首屏）
if (window.TeachAnyCommunity) {
  TeachAnyCommunity.fetchCommunityIndex().catch(() => {});
}

// 课件导入回调：刷新 Hub 索引 + 重新渲染当前知识地图
window.teachanyOnCourseImported = function(nodeId) {
  // 先刷新 Hub 索引，将新导入课件纳入统一检索
  if (window.TeachAnyHub) TeachAnyHub.refreshIndex();
  const activeIdx = Array.from(document.querySelectorAll('.subject-tab')).findIndex(t => t.classList.contains('active'));
  if (activeIdx >= 0) loadTree(activeIdx);
};
</script>
