<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>官方课件诊断工具 - TeachAny</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 40px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
      font-size: 32px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 40px;
      font-size: 16px;
    }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin: 8px;
      transition: all 0.3s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-danger {
      background: linear-gradient(135deg, #f093fb, #f5576c);
    }

    .btn-success {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .section {
      margin: 30px 0;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 12px;
      border-left: 4px solid #667eea;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      color: #333;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .result {
      padding: 15px;
      background: white;
      border-radius: 8px;
      margin: 10px 0;
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-wrap;
      font-family: 'Courier New', monospace;
    }

    .success {
      border-left: 4px solid #28a745;
      color: #155724;
      background: #d4edda;
    }

    .error {
      border-left: 4px solid #dc3545;
      color: #721c24;
      background: #f8d7da;
    }

    .warning {
      border-left: 4px solid #ffc107;
      color: #856404;
      background: #fff3cd;
    }

    .info {
      border-left: 4px solid #17a2b8;
      color: #0c5460;
      background: #d1ecf1;
    }

    .course-card {
      background: white;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      padding: 15px;
      margin: 10px 0;
      transition: all 0.2s;
    }

    .course-card:hover {
      border-color: #667eea;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
    }

    .course-card .name {
      font-size: 16px;
      font-weight: 700;
      color: #333;
      margin-bottom: 8px;
    }

    .course-card .meta {
      font-size: 13px;
      color: #666;
    }

    .course-card .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 8px;
    }

    .status.official {
      background: linear-gradient(135deg, #f093fb, #f5576c);
      color: white;
    }

    .status.community {
      background: #e9ecef;
      color: #495057;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 30px;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 官方课件诊断工具</h1>
    <p class="subtitle">检查 registry.json 和浏览器缓存状态</p>

    <div class="actions">
      <button class="btn" onclick="checkRegistry()">📊 检查 Registry</button>
      <button class="btn" onclick="checkCache()">💾 检查缓存</button>
      <button class="btn btn-danger" onclick="clearCache()">🗑️ 清除缓存</button>
      <button class="btn btn-success" onclick="forceReload()">🔄 强制刷新</button>
      <button class="btn" onclick="runFullDiagnosis()">🔬 完整诊断</button>
    </div>

    <div id="results"></div>
  </div>

  <script>
    const REGISTRY_URL = './registry.json';
    const CACHE_KEY = 'teachany_registry_v3';

    function showResult(html) {
      document.getElementById('results').innerHTML = html;
    }

    function addResult(html) {
      document.getElementById('results').innerHTML += html;
    }

    // 检查 Registry
    async function checkRegistry() {
      showResult('<div class="result info">⏳ 正在从服务器加载 registry.json...</div>');

      try {
        const response = await fetch(REGISTRY_URL + '?t=' + Date.now());
        if (!response.ok) {
          showResult(`<div class="result error">❌ 加载失败: HTTP ${response.status}</div>`);
          return;
        }

        const data = await response.json();
        const official = data.courses.filter(c => c.status === 'official');
        const community = data.courses.filter(c => c.status === 'community');

        let html = '<div class="section">';
        html += '<div class="section-title">📊 Registry.json 数据</div>';
        html += `<div class="result success">✅ 加载成功\n`;
        html += `总课件数: ${data.courses.length}\n`;
        html += `官方课件: ${official.length}\n`;
        html += `社区课件: ${community.length}\n`;
        html += `版本: ${data.version || '未知'}\n`;
        html += `更新时间: ${data.updated_at || '未知'}</div>`;

        if (official.length > 0) {
          html += '<div class="section-title">⭐ 官方课件详情</div>';
          official.forEach((c, i) => {
            html += `<div class="course-card">`;
            html += `<div class="name">${i + 1}. ${c.name || '未命名'}</div>`;
            html += `<div class="meta">📚 ${c.subject || '未知'} | 🎓 ${c.grade || '?'}年级 | 🆔 ${c.id}</div>`;
            html += `<span class="status official">⭐ 官方课件</span>`;
            html += `</div>`;
          });
        } else {
          html += '<div class="result warning">⚠️ 没有找到官方课件！所有课件的 status 字段可能都是 "community"</div>';
        }

        html += '</div>';
        showResult(html);

      } catch (error) {
        showResult(`<div class="result error">❌ 加载失败: ${error.message}</div>`);
      }
    }

    // 检查缓存
    function checkCache() {
      const cached = localStorage.getItem(CACHE_KEY);

      if (!cached) {
        showResult('<div class="result info">ℹ️ 没有缓存数据（这是正常的）</div>');
        return;
      }

      try {
        const data = JSON.parse(cached);
        const registry = data.data;
        const official = registry.courses.filter(c => c.status === 'official');
        const community = registry.courses.filter(c => c.status === 'community');

        let html = '<div class="section">';
        html += '<div class="section-title">💾 浏览器缓存数据</div>';
        html += `<div class="result ${official.length > 0 ? 'success' : 'warning'}">`;
        html += `缓存时间: ${new Date(data.timestamp).toLocaleString()}\n`;
        html += `总课件数: ${registry.courses.length}\n`;
        html += `官方课件: ${official.length}\n`;
        html += `社区课件: ${community.length}\n`;
        html += `版本: ${registry.version || '未知'}\n\n`;

        if (official.length === 0) {
          html += `⚠️ 警告: 缓存中没有官方课件！\n`;
          html += `这可能是旧版本的缓存数据。\n`;
          html += `建议: 点击"清除缓存"按钮。`;
        } else {
          html += `✅ 缓存数据正常`;
        }

        html += `</div></div>`;
        showResult(html);

      } catch (error) {
        showResult(`<div class="result error">❌ 缓存数据解析失败: ${error.message}</div>`);
      }
    }

    // 清除缓存
    function clearCache() {
      localStorage.removeItem(CACHE_KEY);
      showResult(`
        <div class="result success">
          ✅ 缓存已清除！

          下次访问首页或Gallery时，系统会从服务器重新加载最新的 registry.json。

          建议: 点击"强制刷新"按钮或按 Ctrl+Shift+R (Windows/Linux) / Cmd+Shift+R (Mac)
        </div>
      `);
    }

    // 强制刷新
    function forceReload() {
      location.reload(true);
    }

    // 完整诊断
    async function runFullDiagnosis() {
      showResult('<div class="result info">🔬 正在运行完整诊断...</div>');
      await new Promise(r => setTimeout(r, 500));

      let html = '';

      // 1. 检查 Registry
      html += '<div class="section"><div class="section-title">1️⃣ 检查 Registry.json</div>';
      try {
        const response = await fetch(REGISTRY_URL + '?t=' + Date.now());
        const data = await response.json();
        const official = data.courses.filter(c => c.status === 'official');
        const community = data.courses.filter(c => c.status === 'community');

        if (official.length > 0) {
          html += `<div class="result success">✅ Registry 正常\n官方课件: ${official.length} 个\n社区课件: ${community.length} 个</div>`;
        } else {
          html += `<div class="result error">❌ Registry 异常\n没有找到官方课件！</div>`;
        }
      } catch (error) {
        html += `<div class="result error">❌ 加载失败: ${error.message}</div>`;
      }
      html += '</div>';

      // 2. 检查缓存
      html += '<div class="section"><div class="section-title">2️⃣ 检查浏览器缓存</div>';
      const cached = localStorage.getItem(CACHE_KEY);
      if (!cached) {
        html += '<div class="result success">✅ 无缓存（将从服务器加载）</div>';
      } else {
        try {
          const data = JSON.parse(cached);
          const registry = data.data;
          const official = registry.courses.filter(c => c.status === 'official');

          if (official.length > 0) {
            html += `<div class="result success">✅ 缓存正常\n官方课件: ${official.length} 个</div>`;
          } else {
            html += `<div class="result warning">⚠️ 缓存过期\n官方课件: 0 个\n建议清除缓存</div>`;
          }
        } catch (error) {
          html += `<div class="result error">❌ 缓存损坏\n${error.message}</div>`;
        }
      }
      html += '</div>';

      // 3. 检查前端加载器
      html += '<div class="section"><div class="section-title">3️⃣ 检查前端加载器</div>';
      if (typeof window.TeachAnyGallery !== 'undefined') {
        html += '<div class="result success">✅ unified-loader.js 已加载</div>';
      } else {
        html += '<div class="result error">❌ unified-loader.js 未加载</div>';
      }
      html += '</div>';

      // 4. 检查统计计算器
      html += '<div class="section"><div class="section-title">4️⃣ 检查统计系统</div>';
      if (typeof window.TeachAnyStats !== 'undefined') {
        html += '<div class="result success">✅ stats-calculator.js 已加载</div>';
      } else {
        html += '<div class="result warning">⚠️ stats-calculator.js 未加载或未初始化</div>';
      }
      html += '</div>';

      // 5. 推荐操作
      html += '<div class="section"><div class="section-title">💡 建议操作</div>';
      const hasBadCache = cached && JSON.parse(cached).data.courses.filter(c => c.status === 'official').length === 0;
      
      if (hasBadCache) {
        html += `<div class="result warning">⚠️ 检测到旧缓存\n\n建议步骤:\n`;
        html += `1. 点击"清除缓存"按钮\n`;
        html += `2. 点击"强制刷新"按钮\n`;
        html += `3. 返回首页查看统计数据</div>`;
      } else {
        html += `<div class="result success">✅ 系统状态正常\n\n如果前端仍显示 0 个官方课件:\n`;
        html += `1. 按 Ctrl+Shift+R (Win) 或 Cmd+Shift+R (Mac) 强制刷新\n`;
        html += `2. 或者清除浏览器缓存后重新访问</div>`;
      }
      html += '</div>';

      showResult(html);
    }

    // 页面加载时自动运行诊断
    window.addEventListener('DOMContentLoaded', () => {
      runFullDiagnosis();
    });
  </script>
</body>
</html>
