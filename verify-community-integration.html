<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社区课件集成验证 - TeachAny</title>
<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --border: rgba(148,163,184,0.15);
  --text: #f8fafc;
  --success: #10b981;
  --danger: #ef4444;
  --warning: #f59e0b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'PingFang SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 40px;
  line-height: 1.6;
}
.container { max-width: 1000px; margin: 0 auto; }
h1 { 
  font-size: 32px; 
  margin-bottom: 32px;
  background: linear-gradient(135deg, #3b82f6, #10b981);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.test-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 24px;
}
.test-title {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.status {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  margin-left: auto;
}
.status.pending { background: rgba(148,163,184,0.2); color: #94a3b8; }
.status.success { background: rgba(16,185,129,0.15); color: var(--success); }
.status.error { background: rgba(239,68,68,0.15); color: var(--danger); }
.status.warning { background: rgba(245,158,11,0.15); color: var(--warning); }
.test-result {
  background: rgba(15,23,42,0.5);
  border-radius: 8px;
  padding: 12px;
  font-size: 13px;
  margin-top: 12px;
  font-family: 'Courier New', monospace;
}
.course-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 12px;
  margin-top: 12px;
}
.course-item {
  background: rgba(15,23,42,0.5);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  font-size: 13px;
}
.course-name { font-weight: 600; margin-bottom: 4px; }
.course-meta { font-size: 11px; color: #94a3b8; }
button {
  background: linear-gradient(135deg, #3b82f6, #10b981);
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 16px;
}
button:hover { filter: brightness(1.15); }
button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>

<div class="container">
  <h1>🌐 社区课件集成验证</h1>

  <!-- Test 1: Registry Streamlining -->
  <div class="test-section">
    <div class="test-title">
      ✅ Test 1: 官方课件精简（100+ → 7）
      <span class="status pending" id="test1-status">等待中...</span>
    </div>
    <div id="test1-result" class="test-result"></div>
  </div>

  <!-- Test 2: Community Index -->
  <div class="test-section">
    <div class="test-title">
      🌐 Test 2: 社区课件索引加载
      <span class="status pending" id="test2-status">等待中...</span>
    </div>
    <div id="test2-result" class="test-result"></div>
    <div id="test2-courses" class="course-list"></div>
  </div>

  <!-- Test 3: Gallery Integration -->
  <div class="test-section">
    <div class="test-title">
      📋 Test 3: Gallery页面集成
      <span class="status pending" id="test3-status">等待中...</span>
    </div>
    <div id="test3-result" class="test-result"></div>
  </div>

  <!-- Test 4: Knowledge Map Integration -->
  <div class="test-section">
    <div class="test-title">
      🗺️ Test 4: 知识地图集成
      <span class="status pending" id="test4-status">等待中...</span>
    </div>
    <div id="test4-result" class="test-result"></div>
  </div>

  <button onclick="runAllTests()">▶ 运行所有测试</button>
</div>

<script src="./scripts/community-loader.js"></script>
<script>
// Utility functions
function setStatus(testId, status, message) {
  const statusEl = document.getElementById(`${testId}-status`);
  const resultEl = document.getElementById(`${testId}-result`);
  
  statusEl.className = `status ${status}`;
  statusEl.textContent = status === 'success' ? '✅ 通过' : 
                         status === 'error' ? '❌ 失败' : 
                         status === 'warning' ? '⚠️ 警告' : '⏳ 测试中...';
  
  if (resultEl && message) {
    resultEl.innerHTML = message;
  }
}

// Test 1: Registry streamlining
async function test1_registryStreamlining() {
  setStatus('test1', 'pending', '正在加载官方课件注册表...');
  
  try {
    const response = await fetch('./courseware-registry.json?v=' + Date.now());
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    
    const registry = await response.json();
    const courseCount = (registry.courses || []).length;
    
    if (courseCount === 7) {
      setStatus('test1', 'success', 
        `✅ 官方课件精简成功！\n` +
        `版本: ${registry.version}\n` +
        `课件数量: ${courseCount}/7\n` +
        `更新时间: ${registry.updated_at}\n\n` +
        `保留课件列表:\n` +
        registry.courses.map((c, i) => 
          `${i + 1}. ${c.name} (${c.subject} Grade ${c.grade})`
        ).join('\n')
      );
    } else {
      setStatus('test1', 'error', 
        `❌ 课件数量不符：期望7个，实际${courseCount}个`
      );
    }
  } catch (err) {
    setStatus('test1', 'error', `❌ 测试失败: ${err.message}`);
  }
}

// Test 2: Community index
async function test2_communityIndex() {
  setStatus('test2', 'pending', '正在加载社区课件索引...');
  
  try {
    // Use community-loader.js function
    if (!window.TeachAnyCommunity) {
      throw new Error('TeachAnyCommunity 未加载');
    }
    
    const index = await window.TeachAnyCommunity.fetchCommunityIndex(true);
    const courseCount = (index.courses || []).length;
    
    if (courseCount > 0) {
      setStatus('test2', 'success', 
        `✅ 社区课件索引加载成功！\n` +
        `版本: ${index.version}\n` +
        `课件数量: ${courseCount}个\n` +
        `更新时间: ${index.updated_at}\n\n` +
        `按学科分布:\n` +
        Object.entries(
          index.courses.reduce((acc, c) => {
            acc[c.subject] = (acc[c.subject] || 0) + 1;
            return acc;
          }, {})
        ).map(([subject, count]) => `- ${subject}: ${count}个`).join('\n')
      );
      
      // Render course cards
      const coursesEl = document.getElementById('test2-courses');
      coursesEl.innerHTML = index.courses.slice(0, 6).map(c => `
        <div class="course-item">
          <div class="course-name">🌐 ${c.name}</div>
          <div class="course-meta">
            📚 ${c.subject} · 🎓 Grade ${c.grade} · 👤 ${c.author}
          </div>
        </div>
      `).join('');
      
    } else {
      setStatus('test2', 'warning', '⚠️ 社区课件索引为空');
    }
  } catch (err) {
    setStatus('test2', 'error', `❌ 测试失败: ${err.message}`);
  }
}

// Test 3: Gallery integration
async function test3_galleryIntegration() {
  setStatus('test3', 'pending', '正在测试 Gallery 页面...');
  
  try {
    // Check if index.html includes community-loader.js
    const response = await fetch('./index.html');
    if (!response.ok) throw new Error(`无法加载 Gallery 页面: HTTP ${response.status}`);
    
    const html = await response.text();
    
    const checks = {
      'community-loader.js脚本': html.includes('community-loader.js'),
      '社区课件区块': html.includes('communitySection') || html.includes('communityGrid'),
      '社区标签🌐': html.includes('🌐'),
      '筛选逻辑': html.includes('filterGallery') || html.includes('filterCourses'),
    };
    
    const passed = Object.values(checks).filter(v => v).length;
    const total = Object.keys(checks).length;
    
    if (passed === total) {
      setStatus('test3', 'success', 
        `✅ Gallery 集成验证通过！\n\n` +
        Object.entries(checks).map(([k, v]) => 
          `${v ? '✅' : '❌'} ${k}`
        ).join('\n') +
        `\n\n🔗 测试链接: <a href="./index.html" target="_blank" style="color:#10b981">打开 Gallery</a>`
      );
    } else {
      setStatus('test3', 'warning', 
        `⚠️ 部分检查未通过 (${passed}/${total})\n\n` +
        Object.entries(checks).map(([k, v]) => 
          `${v ? '✅' : '❌'} ${k}`
        ).join('\n')
      );
    }
  } catch (err) {
    setStatus('test3', 'error', `❌ 测试失败: ${err.message}`);
  }
}

// Test 4: Knowledge map integration
async function test4_knowledgeMapIntegration() {
  setStatus('test4', 'pending', '正在测试知识地图...');
  
  try {
    const response = await fetch('./tree.html');
    if (!response.ok) throw new Error(`无法加载知识地图: HTTP ${response.status}`);
    
    const html = await response.text();
    
    const checks = {
      'community-loader.js脚本': html.includes('community-loader.js'),
      '社区课件tooltip': html.includes('renderCommunityCoursesInTooltip') || html.includes('ta-community'),
      '知识树JSON加载': html.includes('fetchTreeJSON') || html.includes('data/trees/'),
      '社区课件标识': html.includes('社区共享') || html.includes('🌐'),
    };
    
    const passed = Object.values(checks).filter(v => v).length;
    const total = Object.keys(checks).length;
    
    if (passed === total) {
      setStatus('test4', 'success', 
        `✅ 知识地图集成验证通过！\n\n` +
        Object.entries(checks).map(([k, v]) => 
          `${v ? '✅' : '❌'} ${k}`
        ).join('\n') +
        `\n\n🔗 测试链接: <a href="./tree.html" target="_blank" style="color:#10b981">打开知识地图</a>`
      );
    } else {
      setStatus('test4', 'warning', 
        `⚠️ 部分检查未通过 (${passed}/${total})\n\n` +
        Object.entries(checks).map(([k, v]) => 
          `${v ? '✅' : '❌'} ${k}`
        ).join('\n')
      );
    }
  } catch (err) {
    setStatus('test4', 'error', `❌ 测试失败: ${err.message}`);
  }
}

// Run all tests
async function runAllTests() {
  await test1_registryStreamlining();
  await new Promise(r => setTimeout(r, 500));
  await test2_communityIndex();
  await new Promise(r => setTimeout(r, 500));
  await test3_galleryIntegration();
  await new Promise(r => setTimeout(r, 500));
  await test4_knowledgeMapIntegration();
}

// Auto-run on load
window.addEventListener('DOMContentLoaded', () => {
  setTimeout(runAllTests, 500);
});
</script>

</body>
</html>
