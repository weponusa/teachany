<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Loader 诊断</title>
  <style>
    body { font-family: system-ui; padding: 20px; max-width: 800px; margin: 0 auto; }
    h2 { color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
    .ok { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .info { background: #d1ecf1; color: #0c5460; }
    pre { background: #f5f5f5; padding: 10px; border-radius: 5px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; margin: 10px 0; }
    td, th { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f0f0f0; }
  </style>
</head>
<body>
  <h1>🔍 TeachAny Loader 诊断</h1>
  
  <div id="results"></div>

  <script>
    const results = document.getElementById('results');

    function log(type, title, content) {
      const div = document.createElement('div');
      div.className = `status ${type}`;
      div.innerHTML = `<strong>${title}</strong><br>${content}`;
      results.appendChild(div);
    }

    async function test() {
      // 测试1: 加载 registry.json
      log('info', '测试1: 加载 registry.json', '开始...');
      try {
        const response = await fetch('./registry.json?t=' + Date.now());
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        
        const official = data.courses.filter(c => c.status === 'official');
        const community = data.courses.filter(c => c.status === 'community');
        
        log('ok', '✅ registry.json 加载成功', `
          <strong>版本</strong>: ${data.version}<br>
          <strong>总课件数</strong>: ${data.courses.length}<br>
          <strong>官方课件</strong>: ${official.length}<br>
          <strong>社区课件</strong>: ${community.length}
        `);

        // 显示官方课件列表
        let officialList = '<table><tr><th>ID</th><th>名称</th><th>学科</th></tr>';
        official.forEach(c => {
          const name = c.name || c.title || 'NO NAME';
          officialList += `<tr><td>${c.id}</td><td>${name}</td><td>${c.subject}</td></tr>`;
        });
        officialList += '</table>';
        log('info', '📋 官方课件列表', officialList);

        // 测试2: 检查必要字段
        log('info', '测试2: 字段完整性检查', '检查中...');
        const missingFields = [];
        data.courses.forEach(c => {
          if (!c.name && !c.title) {
            missingFields.push(`${c.id}: 缺少 name/title`);
          }
          if (!c.status) {
            missingFields.push(`${c.id}: 缺少 status`);
          }
        });

        if (missingFields.length === 0) {
          log('ok', '✅ 所有课件字段完整', '所有课件都有必要的 name 和 status 字段');
        } else {
          log('error', '❌ 发现字段缺失', '<pre>' + missingFields.join('\n') + '</pre>');
        }

        // 测试3: 测试 unified-loader.js
        log('info', '测试3: 加载 unified-loader.js', '开始...');
        await new Promise(resolve => {
          const script = document.createElement('script');
          script.src = './scripts/unified-loader.js';
          script.onload = () => {
            log('ok', '✅ unified-loader.js 加载成功', 
              `TeachAnyUnifiedLoader API 可用: ${!!window.TeachAnyUnifiedLoader}`);
            resolve();
          };
          script.onerror = () => {
            log('error', '❌ unified-loader.js 加载失败', 'JavaScript 文件无法加载');
            resolve();
          };
          document.head.appendChild(script);
        });

        // 测试4: localStorage 缓存
        log('info', '测试4: localStorage 缓存', '检查中...');
        const cacheKey = 'teachany_registry_v3';
        const cached = localStorage.getItem(cacheKey);
        if (cached) {
          try {
            const { data: cachedData, timestamp } = JSON.parse(cached);
            const age = Math.floor((Date.now() - timestamp) / 1000 / 60);
            log('info', '💾 发现缓存', `
              缓存年龄: ${age} 分钟<br>
              缓存课件数: ${cachedData?.courses?.length || 0}
            `);
          } catch {
            log('error', '⚠️  缓存损坏', '已自动清除');
            localStorage.removeItem(cacheKey);
          }
        } else {
          log('info', '💾 无缓存', '首次加载,将创建缓存');
        }

      } catch (err) {
        log('error', '❌ 测试失败', '<pre>' + err.stack + '</pre>');
      }
    }

    test();
  </script>
</body>
</html>
