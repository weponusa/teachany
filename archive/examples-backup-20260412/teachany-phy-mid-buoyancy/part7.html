<script>
// ═══ Knowledge Graph ═══
const knowledgeGraphData={currentNode:"buoyancy",currentLabel:"浮力",
coreSubTopics:[{id:"sub-origin",label:"浮力的产生"},{id:"sub-archimedes",label:"阿基米德原理"},{id:"sub-floatsink",label:"浮沉条件"}],
prerequisites:[{id:"pressure",label:"固体压强 p=F/S",hasCourseware:true,url:"../teachany-phy-mid-pressure/index.html",connectsTo:["sub-origin"]},{id:"liquid-pressure",label:"液体压强 p=ρgh",hasCourseware:true,url:"../teachany-phy-mid-pressure/index.html",connectsTo:["sub-origin","sub-archimedes"]},{id:"atmospheric",label:"大气压强",hasCourseware:true,url:"../teachany-phy-mid-atmospheric-pressure/index.html",connectsTo:["sub-origin"]}],
nextTopics:[{id:"fluid-flow",label:"流体压强与流速",hasCourseware:false,url:"",connectsFrom:["sub-floatsink"]},{id:"bernoulli",label:"伯努利方程(高中)",hasCourseware:false,url:"",connectsFrom:["sub-archimedes"]},{id:"ship-design",label:"船舶浮力设计",hasCourseware:false,url:"",connectsFrom:["sub-floatsink"]}]};
(function renderKG(){
  const svg=document.getElementById('kg-svg');if(!svg)return;const d=knowledgeGraphData;
  const NS='http://www.w3.org/2000/svg',el=t=>document.createElementNS(NS,t);
  const C={pre:'#06b6d4',core:'#f59e0b',sub:'#3b82f6',next:'#10b981',preBg:'rgba(6,182,212,0.12)',coreBg:'rgba(245,158,11,0.18)',subBg:'rgba(59,130,246,0.12)',nextBg:'rgba(16,185,129,0.12)',noCw:'#94a3b8',noCwBg:'rgba(148,163,184,0.08)'};
  const pre=d.prerequisites||[],sub=d.coreSubTopics||[],nxt=d.nextTopics||[];
  const maxR=Math.max(pre.length,sub.length+1,nxt.length),rH=60;
  const W=1100,H=Math.max(360,(maxR+1)*rH+40);
  svg.setAttribute('viewBox','0 0 '+W+' '+H);svg.style.minHeight=H+'px';
  const colX=[120,W/2,W-120],nW=200,nH=36;
  const defs=el('defs');
  ['pre','core','sub','next'].forEach(k=>{const m=el('marker');m.setAttribute('id','a-'+k);m.setAttribute('viewBox','0 0 10 10');m.setAttribute('refX','10');m.setAttribute('refY','5');m.setAttribute('markerWidth','6');m.setAttribute('markerHeight','6');m.setAttribute('orient','auto-start-reverse');const p=el('path');p.setAttribute('d','M0 0L10 5L0 10z');p.setAttribute('fill',C[k]);m.appendChild(p);defs.appendChild(m)});
  svg.appendChild(defs);
  function drawNode(cx,cy,txt,col,bg,url){const g=el('g');g.style.cursor=url?'pointer':'default';if(url)g.onclick=()=>window.open(url,'_blank');const r=el('rect');r.setAttribute('x',cx-nW/2);r.setAttribute('y',cy-nH/2);r.setAttribute('width',nW);r.setAttribute('height',nH);r.setAttribute('rx',10);r.setAttribute('fill',bg);r.setAttribute('stroke',col);r.setAttribute('stroke-width','1.5');if(!url)r.setAttribute('stroke-dasharray','4 3');g.appendChild(r);const t=el('text');t.setAttribute('x',cx);t.setAttribute('y',cy+5);t.setAttribute('text-anchor','middle');t.setAttribute('font-size','13');t.setAttribute('fill',col);t.setAttribute('font-weight','600');t.textContent=txt;g.appendChild(t);svg.appendChild(g);return{cx,cy,left:cx-nW/2,right:cx+nW/2}}
  function drawCurve(x1,y1,x2,y2,col,mk){const p=el('path'),mx=(x1+x2)/2;p.setAttribute('d','M'+x1+' '+y1+' C'+mx+' '+y1+','+mx+' '+y2+','+x2+' '+y2);p.setAttribute('fill','none');p.setAttribute('stroke',col);p.setAttribute('stroke-width','1.5');p.setAttribute('marker-end','url(#a-'+mk+')');svg.appendChild(p)}
  const cY=36,cP=drawNode(colX[1],cY,d.currentLabel,C.core,C.coreBg);
  const sP={};sub.forEach((n,i)=>{const y=cY+(i+1)*rH;sP[n.id]=drawNode(colX[1],y,n.label,C.sub,C.subBg);drawCurve(cP.cx,cY+nH/2,colX[1],y-nH/2,C.sub,'sub')});
  pre.forEach((n,i)=>{const tH=pre.length*rH,sY=cY+(sub.length*rH-tH)/2+rH,y=sY+i*rH;const col=n.hasCourseware?C.pre:C.noCw,bg=n.hasCourseware?C.preBg:C.noCwBg;const p=drawNode(colX[0],y,n.label,col,bg,n.url);(n.connectsTo||[]).forEach(t=>{if(sP[t])drawCurve(p.right,p.cy,sP[t].left,sP[t].cy,C.pre,'pre')})});
  nxt.forEach((n,i)=>{const tH=nxt.length*rH,sY=cY+(sub.length*rH-tH)/2+rH,y=sY+i*rH;const col=n.hasCourseware?C.next:C.noCw,bg=n.hasCourseware?C.nextBg:C.noCwBg;const p=drawNode(colX[2],y,n.label,col,bg,n.url);(n.connectsFrom||[]).forEach(s=>{if(sP[s])drawCurve(sP[s].right,sP[s].cy,p.left,p.cy,C.next,'next')})});
  [['前序知识',colX[0]],['核心子知识点',colX[1]],['后续知识',colX[2]]].forEach(([t,x])=>{const tx=el('text');tx.setAttribute('x',x);tx.setAttribute('y',H-10);tx.setAttribute('text-anchor','middle');tx.setAttribute('font-size','12');tx.setAttribute('fill','#64748b');tx.textContent=t;svg.appendChild(tx)});
})();

// ═══ ConcepTest ═══
const conceptAnswers={
ct1:{correct:'C',feedback:{A:{type:'wrong',text:'❌ 完全浸没后，V排不变（=V物），所以F浮=ρ液gV排=常数。浮力与深度无关！很多同学误以为"越深浮力越大"。'},B:{type:'wrong',text:'❌ 浮力不会减小。完全浸没后V排始终等于V物，不随深度变化。'},C:{type:'correct',text:'✅ 正确！完全浸没后V排=V物=常数，F浮=ρ液gV排不变。浮力只与ρ液和V排有关，与深度无关！'}}},
ct2:{correct:'B',feedback:{A:{type:'wrong',text:'❌ 单位换算出错。200cm³=200×10⁻⁶m³=2×10⁻⁴m³，F浮=1000×10×2×10⁻⁴=2N，不是0.2N。'},B:{type:'correct',text:'✅ 正确！V排=200cm³=2×10⁻⁴m³，F浮=ρ水gV排=1000×10×2×10⁻⁴=2N。'},C:{type:'wrong',text:'❌ 体积单位没换算对。200cm³=2×10⁻⁴m³（不是2×10⁻³），F浮=2N。'}}},
ct3:{correct:'C',feedback:{A:{type:'wrong',text:'❌ ρ木=600 < ρ水=1000，物体密度小于液体密度应该上浮，最终漂浮，不会下沉。'},B:{type:'wrong',text:'❌ 悬浮需要ρ物=ρ液（密度相等）。ρ木=600≠1000，不会悬浮。'},C:{type:'correct',text:'✅ 正确！ρ木=600 < ρ水=1000 → 上浮 → 最终漂浮在水面。浸入比例=600/1000=60%。'}}}
};
function checkConcept(el,choice,qid){
  const q=conceptAnswers[qid];if(!q)return;const fb=document.getElementById(qid+'-feedback');fb.style.display='block';
  const info=q.feedback[choice];
  fb.style.background=info.type==='correct'?'rgba(16,185,129,0.08)':'rgba(239,68,68,0.08)';
  fb.innerHTML=info.text;
  el.style.borderColor=info.type==='correct'?'var(--success)':'var(--danger)';
  el.style.background=info.type==='correct'?'rgba(16,185,129,0.06)':'rgba(239,68,68,0.06)';
  if(info.type==='correct')onModuleComplete(qid,1,1);
}

// ═══ Pretest ═══
const preAnswers=[
  {correct:'B',explain:'✓ p=ρgh 是液体内部压强公式。p=F/S是压强通用定义，p=mv是动量公式。'},
  {correct:'A',explain:'✓ 深度越大，p=ρgh越大，压强越大，下表面受到的压力也越大。'},
  {correct:'B',explain:'✓ 水的密度=1000 kg/m³=1.0×10³ kg/m³=1 g/cm³。'}
];
function checkPre(el,idx,choice){
  const fb=document.getElementById('pre'+idx+'-fb');fb.style.display='block';
  const ok=choice===preAnswers[idx].correct;
  fb.style.background=ok?'rgba(16,185,129,0.08)':'rgba(239,68,68,0.08)';
  fb.innerHTML=(ok?'✅ ':'❌ 错误。')+preAnswers[idx].explain;
  el.style.borderColor=ok?'var(--success)':'var(--danger)';
  let preScore=0;for(let i=0;i<3;i++){const f=document.getElementById('pre'+i+'-fb');if(f&&f.style.display==='block'&&f.innerHTML.startsWith('✅'))preScore++}
  if(preScore>0)onModuleComplete('pretest',preScore,3);
}

// ═══ Scaffold Checkers ═══
function checkLevel1(){
  const a=document.getElementById('s1a').value.trim().replace(/\s/g,'');
  const b=document.getElementById('s1b').value.trim().replace(/\s/g,'');
  let c=0,html='';
  // V排=5×10⁻⁴ m³
  if(a==='5e-4'||a==='5×10⁻⁴'||a==='5*10^-4'||a==='0.0005'||a==='5×10-4'){c++;document.getElementById('s1a').style.borderColor='var(--success)'}else{document.getElementById('s1a').style.borderColor='var(--danger)';html+='• V排=500cm³=500×10⁻⁶m³=<strong>5×10⁻⁴</strong> m³<br>'}
  if(b==='5'){c++;document.getElementById('s1b').style.borderColor='var(--success)'}else{document.getElementById('s1b').style.borderColor='var(--danger)';html+='• F浮=1000×10×5×10⁻⁴=<strong>5</strong> N<br>'}
  const fb=document.getElementById('l1-feedback');fb.style.display='block';
  if(c===2){fb.style.background='rgba(16,185,129,0.08)';fb.innerHTML='🎉 全对！阿基米德原理计算：V排→F浮，掌握了核心步骤。';onModuleComplete('scaffold-l1',c,2)}
  else{fb.style.background='rgba(239,68,68,0.08)';fb.innerHTML='<span style="color:var(--danger)">需修正</span><br>'+html}
}
function checkLevel2(){
  const a=document.getElementById('s2a').value.trim().replace(/\s/g,'');
  const b=document.getElementById('s2b').value.trim();
  const cv=document.getElementById('s2c').value.trim().replace(/\s/g,'');
  let c=0,html='';
  if(a==='800'){c++;document.getElementById('s2a').style.borderColor='var(--success)'}else{document.getElementById('s2a').style.borderColor='var(--danger)';html+='• ρ=m/V=0.4kg/5×10⁻⁴m³=<strong>800</strong> kg/m³<br>'}
  if(b==='上浮'||b==='漂浮'){c++;document.getElementById('s2b').style.borderColor='var(--success)'}else{document.getElementById('s2b').style.borderColor='var(--danger)';html+='• ρ物=800 < ρ水=1000 → <strong>上浮（漂浮）</strong><br>'}
  if(cv==='4'){c++;document.getElementById('s2c').style.borderColor='var(--success)'}else{document.getElementById('s2c').style.borderColor='var(--danger)';html+='• 漂浮时F浮=G=mg=0.4×10=<strong>4</strong> N<br>'}
  const fb=document.getElementById('l2-feedback');fb.style.display='block';
  if(c===3){fb.style.background='rgba(16,185,129,0.08)';fb.innerHTML='🎉 全对！先判断浮沉再求浮力，完美解题流程！';onModuleComplete('scaffold-l2',c,3)}
  else{fb.style.background='rgba(239,68,68,0.08)';fb.innerHTML='<span style="color:var(--danger)">需修正</span><br>'+html}
}

// ═══ Posttest Quiz ═══
const quizData=[
  {q:'1. 浮力产生的根本原因是（）',opts:['液体有重力','液体对物体上下表面的压力差','物体的重力','液体的表面张力'],ans:1,exp:'✓ 浮力的本质是液体对物体上下表面的压力差：F浮=F下−F上。',diag:{0:'液体有重力是产生液体压强的原因，但浮力的直接原因是压力差。',2:'物体的重力不是浮力产生的原因。',3:'表面张力不能解释浸没物体受到的浮力。'}},
  {q:'2. 完全浸没在水中的石块从 2m 下沉到 8m，浮力（）',opts:['增大','减小','不变','先增后减'],ans:2,exp:'✓ 完全浸没后V排=V物=不变，F浮=ρ液gV排=常数。',diag:{0:'完全浸没后V排不随深度变化，浮力不会增大。',1:'不会减小。',3:'始终不变。'}},
  {q:'3. 阿基米德原理的公式是（）',opts:['F浮=ρ物gV物','F浮=ρ液gV排','F浮=ρ液gV物','F浮=ρ物gV排'],ans:1,exp:'✓ F浮=ρ液gV排。注意是液体密度和排开体积。',diag:{0:'应该是液体密度ρ液，不是物体密度ρ物。',2:'V排不一定等于V物（漂浮时V排<V物）。',3:'密度应该是液体的，体积应该是排开液体的。'}},
  {q:'4. 体积 100cm³ 的铁块完全浸没在水中，浮力是（g取10）',opts:['0.1 N','1 N','7.8 N','78 N'],ans:1,exp:'✓ F浮=ρ水gV排=1000×10×1×10⁻⁴=1N。',diag:{0:'单位换算错误。100cm³=1×10⁻⁴m³，F浮=1N。',2:'7.8N是铁块的重力（近似），不是浮力。',3:'78N算错了，重新检查单位换算。'}},
  {q:'5. ρ物<ρ液，物体在液体中（）',opts:['下沉','悬浮','上浮后漂浮','无法确定'],ans:2,exp:'✓ ρ物<ρ液 → F浮>G → 上浮 → 最终漂浮（F浮=G）。',diag:{0:'ρ物<ρ液意味着浮力>重力，应该上浮。',1:'悬浮要求ρ物=ρ液（严格相等）。',3:'可以确定：密度小于液体的物体一定漂浮。'}},
  {q:'6. 冰的密度约 0.9×10³ kg/m³，冰块浮在水面时浸入水中的体积约占（）',opts:['10%','50%','90%','100%'],ans:2,exp:'✓ V排/V物=ρ冰/ρ水=900/1000=90%。这就是"冰山一角"的来源。',diag:{0:'10%是露出水面的部分。',1:'不是一半，而是密度之比=90%。',3:'100%就是完全浸没/悬浮了，但冰密度<水密度，会漂浮。'}},
  {q:'7. 漂浮在水面的木块，下列说法正确的是（）',opts:['浮力大于重力','浮力等于重力','浮力小于重力','浮力等于排开水的体积'],ans:1,exp:'✓ 漂浮时物体静止，合力为零，所以F浮=G物。',diag:{0:'如果浮力>重力，物体会继续上升。漂浮是平衡态，F浮=G。',2:'如果浮力<重力，物体会下沉。',3:'浮力等于排开水的重力（不是体积）。'}},
  {q:'8. 潜水艇下潜的原理是（）',opts:['增大自身体积','改变水的密度','向水舱注水增大自身重力','减小排开水的体积'],ans:2,exp:'✓ 潜水艇通过向压载水舱注水来增大自身重力，使G>F浮而下潜。',diag:{0:'潜水艇体积基本不变。',1:'不能改变海水密度。',3:'潜水艇完全浸没后V排不变。'}}
];
function buildQuiz(){const a=document.getElementById('quizArea');let h='';quizData.forEach((it,i)=>{h+='<div class="quiz-q"><h4>'+it.q+'</h4>';it.opts.forEach((o,j)=>{h+='<label><input type="radio" name="q'+i+'" value="'+j+'"> '+String.fromCharCode(65+j)+'. '+o+'</label>'});h+='</div>'});a.innerHTML=h}
function submitQuiz(){
  let sc=0,html='';quizData.forEach((it,i)=>{const s=document.querySelector('input[name="q'+i+'"]:checked'),u=s?parseInt(s.value):-1,ok=u===it.ans;if(ok)sc++;
    let fb=ok?it.exp:(it.diag&&it.diag[u])?it.diag[u]:'正确答案:'+String.fromCharCode(65+it.ans)+'。'+it.exp;
    html+='<div style="margin:8px 0;padding:10px;border-radius:8px;background:'+(ok?'rgba(16,185,129,0.06)':'rgba(239,68,68,0.06)')+'"<span style="color:'+(ok?'var(--success)':'var(--danger)')+'">第'+(i+1)+'题 '+(ok?'✓':'✗')+'</span><p style="color:var(--dim);font-size:14px;margin-top:4px">'+fb+'</p></div>'});
  const p=Math.round(sc/quizData.length*100),el=document.getElementById('quizResult');el.className='quiz-result show';
  const g=p>=90?'优秀🌟':p>=70?'良好👍':p>=60?'及格📖':'需加强💪',gc=p>=90?'var(--success)':p>=70?'var(--primary)':p>=60?'var(--accent)':'var(--danger)';
  el.style.background=gc+'15';el.style.border='1px solid '+gc+'40';
  el.innerHTML='<div style="font-size:24px;font-weight:700;color:'+gc+'">后测：'+sc+'/'+quizData.length+'（'+p+'%）— '+g+'</div>'+html;
  onModuleComplete('posttest',sc,quizData.length);
}
