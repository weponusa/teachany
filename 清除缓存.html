<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>清除缓存 - TeachAny</title>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  max-width: 600px;
  margin: 60px auto;
  padding: 24px;
  background: #0f172a;
  color: #f8fafc;
}
.card {
  background: #1e293b;
  border: 1px solid rgba(148, 163, 184, 0.15);
  border-radius: 16px;
  padding: 32px;
  text-align: center;
}
h1 {
  font-size: 28px;
  margin-bottom: 16px;
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
button {
  padding: 14px 28px;
  border-radius: 8px;
  background: #3b82f6;
  color: white;
  border: none;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  margin: 8px;
  transition: all 0.2s;
}
button:hover {
  background: #2563eb;
  transform: scale(1.05);
}
.success {
  background: #10b981;
  padding: 16px;
  border-radius: 8px;
  margin-top: 20px;
  display: none;
}
.nav {
  margin-top: 24px;
}
.nav a {
  color: #94a3b8;
  text-decoration: none;
  margin: 0 12px;
  transition: color 0.2s;
}
.nav a:hover {
  color: #f8fafc;
}
</style>
</head>
<body>

<div class="card">
  <h1>🗑️ 清除浏览器缓存</h1>
  <p style="color:#94a3b8;margin-bottom:24px">
    如果知识地图或Gallery显示的课件数据不正确，<br>
    点击下方按钮清除所有缓存数据
  </p>
  
  <button onclick="clearAll()">清除所有缓存</button>
  <button onclick="clearRegistry()">仅清除课件注册表</button>
  <button onclick="clearTree()">仅清除知识地图</button>
  
  <div class="success" id="result"></div>
  
  <div class="nav">
    <a href="index.html">📋 Gallery</a>
    <a href="tree.html">🗺️ 知识地图</a>
    <a href="path.html">🛤️ 学习路径</a>
  </div>
</div>

<script>
function clearAll() {
  localStorage.clear();
  sessionStorage.clear();
  showResult('✅ 所有缓存已清除！请刷新页面。');
}

function clearRegistry() {
  const keys = Object.keys(localStorage);
  keys.forEach(key => {
    if (key.includes('registry')) {
      localStorage.removeItem(key);
    }
  });
  showResult('✅ 课件注册表缓存已清除！');
}

function clearTree() {
  const keys = Object.keys(localStorage);
  keys.forEach(key => {
    if (key.includes('tree') || key.includes('graph')) {
      localStorage.removeItem(key);
    }
  });
  showResult('✅ 知识地图缓存已清除！');
}

function showResult(msg) {
  const result = document.getElementById('result');
  result.textContent = msg;
  result.style.display = 'block';
  setTimeout(() => {
    window.location.reload();
  }, 1500);
}
</script>

</body>
</html>
